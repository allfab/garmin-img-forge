# Build & Deploy Pages — miroir public GitHub.
#
# Build Zensical identique au pipeline Woodpecker site.yml (interne, LXC) :
# Python 3.12, site/requirements.txt, zensical build depuis site/. Le CNAME
# est écrit *après* build (certains builders écrasent le contenu de _site/).
#
# Coexiste délibérément avec .woodpecker/site.yml — voir le tech-spec
# `github-mirror-pages-cloudflare-cdn`, décision 7.

name: Build & Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Zensical
        run: pip install -r site/requirements.txt

      - name: Build site (FR + EN)
        shell: bash
        run: |
          set -euo pipefail
          cd site

          # Build FR
          zensical build

          # Build EN — vérifie la présence du config avant de lancer
          if [ ! -f zensical-en.toml ]; then
            echo "ERROR: zensical-en.toml introuvable" >&2
            exit 1
          fi
          zensical build --config-file zensical-en.toml

          # Vérifie que le build EN a produit un résultat
          if [ ! -d _site-en ] || [ -z "$(ls -A _site-en)" ]; then
            echo "ERROR: le build EN n'a produit aucun fichier dans _site-en/" >&2
            exit 1
          fi

          # Fusion EN → _site/en/ (hors dotfiles)
          rm -rf _site/en
          mkdir -p _site/en
          find _site-en -mindepth 1 -maxdepth 1 ! -name '.*' -exec cp -r {} _site/en/ \;

          # Copie des assets partagés depuis le build FR (CSS/JS identiques entre les deux builds)
          for dir in stylesheets javascripts; do
            if [ -d "_site/${dir}" ]; then
              rm -rf "_site/en/${dir}"
              cp -r "_site/${dir}" "_site/en/${dir}"
            fi
          done
          # Pour assets : overlay FR → EN sans écraser les fichiers EN-spécifiques (ex: images/01-project.gif)
          # cp -rn requiert GNU coreutils (garanti sur ubuntu-latest)
          if [ -d "_site/assets" ]; then
            cp -rn "_site/assets/." "_site/en/assets/"
          fi

          # Assertion : vérifie que le GIF EN-spécifique est bien présent après la fusion
          if [ ! -f "_site/en/assets/images/01-project.gif" ]; then
            echo "ERROR: _site/en/assets/images/01-project.gif absent après fusion — vérifier le build EN" >&2
            exit 1
          fi

          # Nettoyage du répertoire intermédiaire EN
          rm -rf _site-en

      - name: Write CNAME
        run: echo "imgforge.garmin.allfabox.fr" > site/_site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
