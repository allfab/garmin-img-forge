# Release Republish — miroir public GitHub.
#
# Déclenché sur les tags `mpforge-v*` / `imgforge-v*` qui ont été miroirés
# depuis Forgejo par `.woodpecker/mirror-github.yml`. Attend que Woodpecker
# ait terminé son build côté interne et publié la release Forgejo, puis
# télécharge les assets et les republie en release GitHub.
#
# Aucune recompilation côté GitHub : le build serveur (~20 min pour mpforge
# avec GDAL statique) n'est exécuté qu'une seule fois, sur l'infra interne.
#
# Secrets requis :
#   - FORGEJO_READ_TOKEN : token Forgejo en lecture sur allfab/garmin-img-forge
#     (dépôt privé interne). Scope minimal : `read:repository`.
#
# Voir le tech-spec `github-mirror-pages-cloudflare-cdn` et la section CI/CD
# du README pour le contexte complet.

name: Release Republish

on:
  push:
    tags:
      - 'mpforge-v*'
      - 'imgforge-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag à republier (ex. mpforge-v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-republish-${{ github.ref }}
  cancel-in-progress: false

env:
  FORGEJO_API: https://forgejo.allfabox.fr/api/v1
  FORGEJO_REPO: allfab/garmin-img-forge
  POLL_INTERVAL_SECONDS: 120
  POLL_TIMEOUT_SECONDS: 1500

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          case "$TAG" in
            mpforge-v*)  TOOL=mpforge;  VERSION="${TAG#mpforge-}"  ;;
            imgforge-v*) TOOL=imgforge; VERSION="${TAG#imgforge-}" ;;
            *)
              echo "::error::Tag '$TAG' ne correspond pas à mpforge-v* ou imgforge-v*"
              exit 1
              ;;
          esac
          RELEASE_NAME="$TOOL $VERSION"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "tool=$TOOL"             >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  →  Release: $RELEASE_NAME"

      - name: Wait for Forgejo release
        id: wait
        env:
          FORGEJO_READ_TOKEN: ${{ secrets.FORGEJO_READ_TOKEN }}
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${FORGEJO_READ_TOKEN:-}" ]; then
            echo "::error::Secret FORGEJO_READ_TOKEN manquant (requis pour dépôt Forgejo privé)."
            exit 1
          fi
          URL="$FORGEJO_API/repos/$FORGEJO_REPO/releases/tags/$TAG"
          START=$(date +%s)
          ATTEMPT=0
          while :; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_CODE=$(curl -sS -o /tmp/release.json -w '%{http_code}' \
              -H "Authorization: token $FORGEJO_READ_TOKEN" \
              -H "Accept: application/json" \
              "$URL" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Release Forgejo trouvée (tentative $ATTEMPT)."
              break
            fi
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            if [ "$ELAPSED" -ge "$POLL_TIMEOUT_SECONDS" ]; then
              echo "::error::Timeout (${POLL_TIMEOUT_SECONDS}s) — la release Forgejo pour '$TAG' n'est jamais apparue (dernier HTTP $HTTP_CODE)."
              cat /tmp/release.json || true
              exit 1
            fi
            echo "Tentative $ATTEMPT : HTTP $HTTP_CODE, nouvelle tentative dans ${POLL_INTERVAL_SECONDS}s (écoulé ${ELAPSED}s/${POLL_TIMEOUT_SECONDS}s)."
            sleep "$POLL_INTERVAL_SECONDS"
          done
          BODY=$(jq -r '.body // ""' /tmp/release.json)
          {
            echo 'body<<EOF_BODY'
            echo "$BODY"
            echo 'EOF_BODY'
          } >> "$GITHUB_OUTPUT"

      - name: Download assets from Forgejo
        id: download
        env:
          FORGEJO_READ_TOKEN: ${{ secrets.FORGEJO_READ_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets
          COUNT=$(jq '.assets | length' /tmp/release.json)
          if [ "$COUNT" = "0" ]; then
            echo "::error::La release Forgejo n'a aucun asset — le build Woodpecker a-t-il échoué ?"
            exit 1
          fi
          echo "Téléchargement de $COUNT asset(s)."
          jq -r '.assets[] | [.name, .browser_download_url] | @tsv' /tmp/release.json \
          | while IFS=$'\t' read -r NAME URL; do
              echo "  → $NAME"
              curl -sSL --fail \
                -H "Authorization: token $FORGEJO_READ_TOKEN" \
                -o "assets/$NAME" "$URL"
            done
          ls -lh assets/

      - name: Verify SHA256 checksums (if present)
        run: |
          set -euo pipefail
          cd assets
          SUMS=$(ls SHA256SUMS* 2>/dev/null | head -n1 || true)
          if [ -z "$SUMS" ]; then
            echo "Pas de fichier SHA256SUMS dans la release — vérification ignorée."
            exit 0
          fi
          echo "Vérification via $SUMS"
          sha256sum -c "$SUMS"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.parse.outputs.tag }}
          RELEASE_NAME: ${{ steps.parse.outputs.release_name }}
          NOTES: ${{ steps.wait.outputs.body }}
        run: |
          set -euo pipefail
          NOTES_HEADER="> Miroir de la release canonique Forgejo : https://forgejo.allfabox.fr/$FORGEJO_REPO/releases/tag/$TAG"
          FULL_NOTES="$NOTES_HEADER

$NOTES"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG existe déjà — upload des assets en mode clobber."
            gh release edit "$TAG" --title "$RELEASE_NAME" --notes "$FULL_NOTES"
            gh release upload "$TAG" assets/* --clobber
          else
            gh release create "$TAG" \
              --title "$RELEASE_NAME" \
              --notes "$FULL_NOTES" \
              assets/*
          fi
          echo "Release GitHub publiée : https://github.com/${{ github.repository }}/releases/tag/$TAG"
