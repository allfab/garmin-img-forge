# OGR PolishMap Driver - Valgrind Memory Check
# NFR-GDAL4: Reference counting - no memory leaks
# Quality Gate: Build fails if any leaks detected

name: Valgrind Memcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  memcheck:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            gdal-bin \
            python3-gdal \
            python3-pytest \
            cmake \
            g++ \
            valgrind

      - name: Display versions
        run: |
          valgrind --version
          gdal-config --version

      - name: Configure CMake with Debug symbols
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_CXX_FLAGS="-g -O0 -fno-omit-frame-pointer"
        working-directory: ogr-polishmap

      - name: Build driver (debug)
        run: cmake --build build --parallel
        working-directory: ogr-polishmap

      - name: Set GDAL_DRIVER_PATH
        run: |
          echo "GDAL_DRIVER_PATH=${{ github.workspace }}/ogr-polishmap/build" >> $GITHUB_ENV

      # Run C++ tests under Valgrind
      - name: Valgrind - test_driver_registration
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-driver-registration.log \
                   ./build/test_driver_registration
          cat valgrind-driver-registration.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_identify_content
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-identify-content.log \
                   ./build/test_identify_content
          cat valgrind-identify-content.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_parser_and_open
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-parser-and-open.log \
                   ./build/test_parser_and_open
          cat valgrind-parser-and-open.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_dataset_layers
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-dataset-layers.log \
                   ./build/test_dataset_layers
          cat valgrind-dataset-layers.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_poi_layer
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-poi-layer.log \
                   ./build/test_poi_layer
          cat valgrind-poi-layer.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_polyline_layer
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-polyline-layer.log \
                   ./build/test_polyline_layer
          cat valgrind-polyline-layer.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_polygon_layer
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-polygon-layer.log \
                   ./build/test_polygon_layer
          cat valgrind-polygon-layer.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_filters
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-filters.log \
                   ./build/test_filters
          cat valgrind-filters.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_create
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-create.log \
                   ./build/test_create
          cat valgrind-create.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_header
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-header.log \
                   ./build/test_header
          cat valgrind-header.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_poi_write
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-poi-write.log \
                   ./build/test_poi_write
          cat valgrind-poi-write.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_polyline_write
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-polyline-write.log \
                   ./build/test_polyline_write
          cat valgrind-polyline-write.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_polygon_write
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-polygon-write.log \
                   ./build/test_polygon_write
          cat valgrind-polygon-write.log
        working-directory: ogr-polishmap

      - name: Valgrind - test_driver_metadata
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-driver-metadata.log \
                   ./build/test_driver_metadata
          cat valgrind-driver-metadata.log
        working-directory: ogr-polishmap

      # Run Python tests under Valgrind (smoke test subset for performance)
      # Note: test_valid_corpus.py is a standalone script, run directly
      - name: Valgrind - Python valid corpus smoke test
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --log-file=valgrind-pytest-valid.log \
                   python3 test/test_valid_corpus.py
          cat valgrind-pytest-valid.log
        working-directory: ogr-polishmap

      - name: Generate Valgrind summary
        run: |
          echo "# Valgrind Memcheck Summary" > valgrind-summary.md
          echo "" >> valgrind-summary.md
          echo "## Results" >> valgrind-summary.md
          echo "" >> valgrind-summary.md
          for log in valgrind-*.log; do
            errors=$(grep -c "ERROR SUMMARY:" "$log" || echo "0")
            leaks=$(grep "definitely lost:" "$log" | awk '{print $4}' || echo "0")
            echo "- **${log%.log}**: ${leaks:-0} bytes leaked" >> valgrind-summary.md
          done
          echo "" >> valgrind-summary.md
          echo "## Quality Gate" >> valgrind-summary.md
          echo "" >> valgrind-summary.md
          echo "All tests must pass with 0 memory leaks to satisfy NFR-GDAL4." >> valgrind-summary.md
          cat valgrind-summary.md
        working-directory: ogr-polishmap

      - name: Upload Valgrind reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: valgrind-reports
          path: |
            ogr-polishmap/valgrind-*.log
            ogr-polishmap/valgrind-summary.md
          retention-days: 30
