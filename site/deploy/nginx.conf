server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets versionnés (CSS, JS, images) — cache long
    location ~* \.(css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML et sitemap — pas de cache ou cache court
    location ~* \.(html|xml)$ {
        add_header Cache-Control "no-cache";
    }

    # Proxy Umami tracker — ^~ stoppe la recherche de regex (prioritaire sur location ~* .js$)
    location ^~ /js/ {
        proxy_pass https://umami.allfabox.fr/;
        proxy_set_header Host umami.allfabox.fr;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
