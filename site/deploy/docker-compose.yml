---
services:
  garmin-ign-topo-map:
    container_name: garmin-ign-topo-map
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - 8081:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./www/:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - forge

networks:
  forge:
    external: true
