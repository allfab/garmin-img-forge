<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="12">

  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Format GMP — Garmin Map Product (firmware NT)</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#64748b">Un seul conteneur FAT par tuile, au lieu de 6 entrées séparées (TRE+RGN+LBL+NET+NOD+DEM).</text>

  <!-- Comparaison Legacy vs GMP -->
  <text x="190" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Mode Legacy (6 entrées FAT / tuile)</text>
  <text x="570" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Mode GMP (1 entrée FAT / tuile)</text>

  <!-- Legacy -->
  <rect x="40" y="82" width="300" height="26" rx="2" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="99" text-anchor="middle" fill="#64748b" font-size="11">FAT : I0012345\TRE — I0012345\RGN — I0012345\LBL — …</text>
  <rect x="40" y="110" width="55" height="22" rx="2" fill="#dcfce7" stroke="#4ade80"/>
  <text x="67" y="124" text-anchor="middle" font-size="10" fill="#166534">TRE</text>
  <rect x="97" y="110" width="55" height="22" rx="2" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="124" y="124" text-anchor="middle" font-size="10" fill="#1e40af">RGN</text>
  <rect x="154" y="110" width="55" height="22" rx="2" fill="#fff7ed" stroke="#fb923c"/>
  <text x="181" y="124" text-anchor="middle" font-size="10" fill="#9a3412">LBL</text>
  <rect x="211" y="110" width="55" height="22" rx="2" fill="#f5f3ff" stroke="#c084fc"/>
  <text x="238" y="124" text-anchor="middle" font-size="10" fill="#7e22ce">NET</text>
  <rect x="268" y="110" width="55" height="22" rx="2" fill="#f5f3ff" stroke="#c084fc"/>
  <text x="295" y="124" text-anchor="middle" font-size="10" fill="#7e22ce">NOD</text>

  <text x="190" y="152" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">France entière (~1 500 tuiles) → ~9 000 entrées FAT</text>
  <text x="190" y="168" text-anchor="middle" fill="#ef4444" font-size="11">Boot lent, débordement RAM possible (Alpha 100)</text>

  <!-- GMP -->
  <rect x="420" y="82" width="300" height="26" rx="2" fill="#f0fdf4" stroke="#86efac"/>
  <text x="570" y="99" text-anchor="middle" fill="#166534" font-size="11">FAT : I0012345\GMP</text>

  <!-- GMP container -->
  <rect x="420" y="110" width="300" height="110" rx="4" fill="#f8fafc" stroke="#4ade80" stroke-width="2"/>
  <text x="570" y="130" text-anchor="middle" font-weight="600" fill="#166534">MAPNAME.GMP</text>

  <rect x="435" y="138" width="265" height="22" rx="2" fill="#fef9c3" stroke="#fde047"/>
  <text x="567" y="153" text-anchor="middle" font-size="10" fill="#854d0e">En-tête GMP (0x3D = 61 octets) + copyright (179 oct.)</text>

  <rect x="435" y="162" width="55" height="22" rx="2" fill="#dcfce7" stroke="#4ade80"/>
  <text x="462" y="176" text-anchor="middle" font-size="10" fill="#166534">TRE</text>
  <rect x="492" y="162" width="55" height="22" rx="2" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="519" y="176" text-anchor="middle" font-size="10" fill="#1e40af">RGN</text>
  <rect x="549" y="162" width="55" height="22" rx="2" fill="#fff7ed" stroke="#fb923c"/>
  <text x="576" y="176" text-anchor="middle" font-size="10" fill="#9a3412">LBL</text>
  <rect x="606" y="162" width="40" height="22" rx="2" fill="#f5f3ff" stroke="#c084fc"/>
  <text x="626" y="176" text-anchor="middle" font-size="10" fill="#7e22ce">NET</text>
  <rect x="648" y="162" width="40" height="22" rx="2" fill="#f5f3ff" stroke="#c084fc"/>
  <text x="668" y="176" text-anchor="middle" font-size="10" fill="#7e22ce">NOD</text>
  <rect x="690" y="162" width="20" height="22" rx="2" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="700" y="176" text-anchor="middle" font-size="9" fill="#991b1b">DEM</text>

  <text x="570" y="208" text-anchor="middle" fill="#94a3b8" font-size="10">offsets GMP-absolus dans l'en-tête → relocalisation interne</text>

  <text x="570" y="232" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">France entière → ~1 500 entrées FAT (-83 %) ✓</text>
  <text x="570" y="248" text-anchor="middle" fill="#166534" font-size="11">Boot rapide, RAM économisée (Alpha 100 validé)</text>

  <!-- En-tête GMP détaillé -->
  <text x="380" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Structure de l'en-tête GMP (offset 0x00)</text>

  <rect x="40" y="288" width="680" height="160" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- Table -->
  <rect x="50" y="298" width="70" height="20" fill="#334155" rx="2"/>
  <text x="85" y="312" text-anchor="middle" fill="white" font-size="10" font-weight="600">Offset</text>
  <rect x="122" y="298" width="80" height="20" fill="#334155" rx="2"/>
  <text x="162" y="312" text-anchor="middle" fill="white" font-size="10" font-weight="600">Contenu</text>
  <rect x="204" y="298" width="40" height="20" fill="#334155" rx="2"/>
  <text x="224" y="312" text-anchor="middle" fill="white" font-size="10" font-weight="600">Taille</text>
  <rect x="246" y="298" width="464" height="20" fill="#334155" rx="2"/>
  <text x="478" y="312" text-anchor="middle" fill="white" font-size="10" font-weight="600">Notes</text>

  <g font-size="10">
    <rect x="50" y="320" width="70" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="85" y="332" text-anchor="middle" fill="#475569" font-family="monospace">0x00</text>
    <rect x="122" y="320" width="80" height="18" fill="#fef9c3" stroke="#e2e8f0"/>
    <text x="162" y="332" text-anchor="middle" fill="#854d0e">hlen</text>
    <rect x="204" y="320" width="40" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="224" y="332" text-anchor="middle" fill="#475569">2</text>
    <rect x="246" y="320" width="464" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="478" y="332" text-anchor="middle" fill="#64748b">= 0x003D (61 octets)</text>

    <rect x="50" y="340" width="70" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="85" y="352" text-anchor="middle" fill="#475569" font-family="monospace">0x02</text>
    <rect x="122" y="340" width="80" height="18" fill="#eff6ff" stroke="#e2e8f0"/>
    <text x="162" y="352" text-anchor="middle" fill="#1e40af">magic</text>
    <rect x="204" y="340" width="40" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="224" y="352" text-anchor="middle" fill="#475569">10</text>
    <rect x="246" y="340" width="464" height="18" fill="#eff6ff" stroke="#e2e8f0"/>
    <text x="478" y="352" text-anchor="middle" fill="#1e40af">"GARMIN GMP" (ASCII)</text>

    <rect x="50" y="360" width="70" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="85" y="372" text-anchor="middle" fill="#475569" font-family="monospace">0x0D</text>
    <rect x="122" y="360" width="80" height="18" fill="#fef2f2" stroke="#e2e8f0"/>
    <text x="162" y="372" text-anchor="middle" fill="#991b1b">locked</text>
    <rect x="204" y="360" width="40" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="224" y="372" text-anchor="middle" fill="#475569">1</text>
    <rect x="246" y="360" width="464" height="18" fill="#fef2f2" stroke="#e2e8f0"/>
    <text x="478" y="372" text-anchor="middle" fill="#991b1b">0 = libre (imgforge toujours)</text>

    <rect x="50" y="380" width="70" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="85" y="392" text-anchor="middle" fill="#475569" font-family="monospace">0x19–0x35</text>
    <rect x="122" y="380" width="80" height="18" fill="#f0fdf4" stroke="#e2e8f0"/>
    <text x="162" y="392" text-anchor="middle" fill="#166534">offsets</text>
    <rect x="204" y="380" width="40" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="224" y="392" text-anchor="middle" fill="#475569">4×6</text>
    <rect x="246" y="380" width="464" height="18" fill="#f0fdf4" stroke="#e2e8f0"/>
    <text x="478" y="392" text-anchor="middle" fill="#166534">tre/rgn/lbl/net/nod/dem_offset (GMP-absolus, u32 LE)</text>

    <rect x="50" y="400" width="70" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="85" y="412" text-anchor="middle" fill="#475569" font-family="monospace">0x3D</text>
    <rect x="122" y="400" width="80" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="162" y="412" text-anchor="middle" fill="#64748b">copyright</text>
    <rect x="204" y="400" width="40" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="224" y="412" text-anchor="middle" fill="#475569">179</text>
    <rect x="246" y="400" width="464" height="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="478" y="412" text-anchor="middle" fill="#64748b">2 chaînes NUL-terminées (copyright Garmin)</text>

    <rect x="50" y="420" width="70" height="18" fill="#f0fdf4" stroke="#e2e8f0"/>
    <text x="85" y="432" text-anchor="middle" fill="#166534" font-family="monospace">0xF0+</text>
    <rect x="122" y="420" width="80" height="18" fill="#f0fdf4" stroke="#e2e8f0"/>
    <text x="162" y="432" text-anchor="middle" fill="#166534">blobs</text>
    <rect x="204" y="420" width="40" height="18" fill="#f0fdf4" stroke="#e2e8f0"/>
    <text x="224" y="432" text-anchor="middle" fill="#475569">var.</text>
    <rect x="246" y="420" width="464" height="18" fill="#f0fdf4" stroke="#e2e8f0"/>
    <text x="478" y="432" text-anchor="middle" fill="#166534">TRE blob + RGN blob + LBL blob + NET/NOD/DEM (si présents)</text>
  </g>

  <!-- Note Alpha 100 -->
  <rect x="40" y="462" width="680" height="46" rx="4" fill="#fffbeb" stroke="#fde047" stroke-width="1.5"/>
  <text x="380" y="480" text-anchor="middle" font-weight="600" fill="#92400e">⚠ Contrainte firmware Alpha 100 — TRE hlen = 188 (standard), PAS 309 (NT)</text>
  <text x="380" y="498" text-anchor="middle" font-size="11" fill="#64748b">Les section descriptors TRE[0xD0..0x134] à zéro invalident l'enregistrement → conserver hlen=188 à l'intérieur du GMP.</text>
</svg>
