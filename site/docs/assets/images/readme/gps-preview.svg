<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1000" height="380" fill="#0b1220"/>
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">Ta carte, sur le terrain</text>
  <text x="500" y="64" text-anchor="middle" font-size="13" fill="#94a3b8">Compatible avec tout GPS Garmin acceptant <tspan font-family="monospace">gmapsupp.img</tspan></text>

  <!-- Device silhouette -->
  <g transform="translate(340,95)">
    <rect width="320" height="250" rx="28" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    <rect x="20" y="35" width="280" height="180" rx="6" fill="#2d4a3a"/>
    <!-- buttons -->
    <circle cx="60" cy="230" r="8" fill="#334155"/>
    <circle cx="160" cy="232" r="10" fill="#334155"/>
    <circle cx="260" cy="230" r="8" fill="#334155"/>
    <!-- screen content -->
    <g transform="translate(20,35)">
      <rect width="280" height="180" rx="6" fill="#2d4a3a"/>
      <g stroke="#4d6b54" stroke-width="0.8" fill="none" opacity="0.6">
        <path d="M 0 60 Q 70 40 140 60 T 280 60"/>
        <path d="M 0 90 Q 70 70 140 90 T 280 90"/>
        <path d="M 0 120 Q 70 100 140 120 T 280 120"/>
      </g>
      <path d="M 10 150 C 70 120, 120 100, 180 80 S 260 40, 270 20" stroke="#f59e0b" stroke-width="3" fill="none"/>
      <path d="M 0 120 C 60 110, 110 140, 170 130 S 260 110, 280 115" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.8"/>
      <circle cx="140" cy="95" r="5" fill="#ef4444"/>
      <circle cx="140" cy="95" r="10" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
      <rect x="6" y="6" width="80" height="16" rx="3" fill="#0f172a" opacity="0.75"/>
      <text x="10" y="18" font-size="10" fill="#e2e8f0" font-family="monospace">Isère v2026.03</text>
    </g>
  </g>

  <text x="500" y="360" text-anchor="middle" font-size="12" fill="#64748b">Edge • eTrex • Oregon • GPSMAP — tout appareil acceptant gmapsupp.img</text>
</svg>
