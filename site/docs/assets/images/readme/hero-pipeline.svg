<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#526cfe"/>
      <stop offset="1" stop-color="#5cae58"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="340" fill="url(#bg)"/>
  <text x="600" y="50" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">Garmin IMG Forge — du SIG au GPS, tout en YAML</text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="#94a3b8">Pipeline déclaratif : une source, un YAML, une carte</text>

  <!-- Steps -->
  <g filter="url(#shadow)">
    <g transform="translate(60,130)">
      <rect width="180" height="110" rx="14" fill="#1e293b" stroke="#334155"/>
      <text x="90" y="40" text-anchor="middle" font-size="32">🗺️</text>
      <text x="90" y="72" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e8f0">Données SIG</text>
      <text x="90" y="92" text-anchor="middle" font-size="12" fill="#94a3b8">BDTOPO • OSM</text>
    </g>
    <g transform="translate(290,130)">
      <rect width="180" height="110" rx="14" fill="#312e81" stroke="#4338ca"/>
      <text x="90" y="40" text-anchor="middle" font-size="32">⚙️</text>
      <text x="90" y="72" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e8f0">mpforge</text>
      <text x="90" y="92" text-anchor="middle" font-size="12" fill="#c7d2fe">YAML → .mp</text>
    </g>
    <g transform="translate(520,130)">
      <rect width="180" height="110" rx="14" fill="#1e3a2f" stroke="#166534"/>
      <text x="90" y="40" text-anchor="middle" font-size="32">🔨</text>
      <text x="90" y="72" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e8f0">imgforge</text>
      <text x="90" y="92" text-anchor="middle" font-size="12" fill="#bbf7d0">.mp → .img (Pure Rust)</text>
    </g>
    <g transform="translate(750,130)">
      <rect width="180" height="110" rx="14" fill="#3b2f10" stroke="#a16207"/>
      <text x="90" y="40" text-anchor="middle" font-size="32">💾</text>
      <text x="90" y="72" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e8f0">gmapsupp.img</text>
      <text x="90" y="92" text-anchor="middle" font-size="12" fill="#fde68a">Prêt à copier</text>
    </g>
    <g transform="translate(980,130)">
      <rect width="160" height="110" rx="14" fill="#3b0a1a" stroke="#be123c"/>
      <text x="80" y="40" text-anchor="middle" font-size="32">📡</text>
      <text x="80" y="72" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e8f0">GPS Garmin</text>
      <text x="80" y="92" text-anchor="middle" font-size="12" fill="#fecaca">Edge • eTrex • Oregon</text>
    </g>
  </g>

  <!-- Arrows -->
  <g stroke="url(#arrow)" stroke-width="3" fill="none">
    <path d="M 240 185 L 290 185" marker-end="url(#arrowhead)"/>
    <path d="M 470 185 L 520 185" marker-end="url(#arrowhead)"/>
    <path d="M 700 185 L 750 185" marker-end="url(#arrowhead)"/>
    <path d="M 930 185 L 980 185" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#5cae58"/>
    </marker>
  </defs>

  <text x="600" y="300" text-anchor="middle" font-size="13" fill="#64748b">Configuration déclarative • Zéro dépendance native (imgforge) • Binaire statique unique (mpforge)</text>
</svg>
