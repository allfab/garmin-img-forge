site_name = "GARMIN IGN BDTOPO MAP"
site_url = "https://maps.garmin.allfabox.fr"
site_description = "Cartes topographiques Garmin générées à partir des données IGN BD TOPO ouvertes"
site_author = "allfab"
docs_dir = "docs"
site_dir = "_site"
use_directory_urls = true

[theme]
name = "classic"
language = "fr"
palette = [
  { media = "(prefers-color-scheme: light)", scheme = "default", primary = "green", accent = "deep-orange", toggle = { icon = "material/brightness-7", name = "Mode sombre" } },
  { media = "(prefers-color-scheme: dark)", scheme = "slate", primary = "green", accent = "deep-orange", toggle = { icon = "material/brightness-4", name = "Mode clair" } }
]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.annotate",
  "content.code.copy"
]

[theme.font]
text = "Roboto"
code = "Roboto Mono"

[[nav]]
Accueil = "index.md"

[[nav]]
Introduction = "01-introduction/index.md"

[[nav]]
"Pile technologique" = [
  { "Vue d'ensemble" = "02-pile-technologique/index.md" },
  { "Logiciels et outils" = "02-pile-technologique/logiciels-outils.md" },
  { Arborescence = "02-pile-technologique/arborescence.md" },
  { "Socle de données" = "02-pile-technologique/socle-donnees.md" }
]

[[nav]]
Processus = [
  { "Vue d'ensemble" = "03-processus/index.md" },
  { "Diagramme de flux" = "03-processus/diagramme.md" },
  { "Détail des étapes" = "03-processus/details-processus.md" }
]

[[nav]]
"Guide pas à pas" = [
  { Introduction = "04-guide-pas-a-pas/index.md" },
  { "Préambule" = "04-guide-pas-a-pas/preambule.md" },
  { "Format Polish Map" = "04-guide-pas-a-pas/polish-map-format.md" },
  { "Compilation Garmin IMG" = "04-guide-pas-a-pas/compilation-garmin-img.md" },
  { "Limites des formats" = "04-guide-pas-a-pas/limites-formats.md" }
]

[[nav]]
Installation = [
  { "Vue d'ensemble" = "05-installation/index.md" },
  { "Assemblage des données" = "05-installation/assemblage-donnees.md" },
  { "Procédure d'installation" = "05-installation/procedure-installation.md" }
]

[[nav]]
"Téléchargements" = [
  { "Vue d'ensemble" = "06-telechargements/index.md" },
  { "France métropolitaine" = "06-telechargements/france.md" },
  { "Par région" = "06-telechargements/regions.md" },
  { "Outre-mer" = "06-telechargements/outre-mer.md" }
]

[markdown_extensions]
admonition = {}
"pymdownx.highlight" = { anchor_linenums = true }
"pymdownx.inlinehilite" = {}
"pymdownx.snippets" = {}
"pymdownx.superfences" = { custom_fences = [{ name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_div_format" }] }
"pymdownx.tabbed" = { alternate_style = true }
tables = {}
footnotes = {}
attr_list = {}
md_in_html = {}

[extra]
generator = false

[[extra.social]]
icon = "fontawesome/brands/git-alt"
link = "https://forgejo.allfabox.fr/allfab/garmin-ign-bdtopo-map"
name = "Dépôt source"

