site_name = "GARMIN IMG FORGE"
site_url = "https://imgforge.garmin.allfabox.fr"
site_description = "Cartes topographiques Garmin générées à partir des données IGN BD TOPO ouvertes"
site_author = "allfab"
repo_url = "https://github.com/allfab/garmin-img-forge"
repo_name = "allfab/garmin-img-forge"
docs_dir = "docs"
site_dir = "_site"
use_directory_urls = true
extra_css = ["stylesheets/hero.css", "stylesheets/extra.css", "stylesheets/donate.css"]
extra_javascript = ["javascripts/lemonsqueezy.js", "javascripts/umami-tracking.js", "javascripts/downloads-manifest.js", "javascripts/medium-zoom.min.js", "javascripts/image-zoom.js"]

[theme]
name = "classic"
custom_dir = "overrides"
favicon = "assets/images/garmin-favicon.png"
logo = "assets/images/garmin-favicon.png"
language = "fr"
palette = [
  { media = "(prefers-color-scheme: light)", scheme = "default", primary = "green", accent = "deep-orange", toggle = { icon = "material/brightness-7", name = "Mode sombre" } },
  { media = "(prefers-color-scheme: dark)", scheme = "slate", primary = "green", accent = "deep-orange", toggle = { icon = "material/brightness-4", name = "Mode clair" } }
]
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.annotate",
  "content.code.copy",
  "navigation.footer"
]

[theme.font]
text = "Roboto"
code = "Roboto Mono"

