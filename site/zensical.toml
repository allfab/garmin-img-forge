[markdown_extensions]
admonition = {}
pymdownx_highlight = { anchor_linenums = true }
pymdownx_inlinehilite = {}
pymdownx_snippets = {}
pymdownx_superfences = { custom_fences = [{ name = "mermaid", class = "mermaid", format = "superfences_format_mermaid" }] }
pymdownx_tabbed = { alternate_style = true }
tables = {}
footnotes = {}
attr_list = {}
md_in_html = {}

[extra]
generator = false

