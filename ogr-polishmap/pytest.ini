[pytest]
# OGR PolishMap Driver - Pytest Configuration

# Test discovery
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --tb=short

# Timeout for tests (in seconds)
# Performance tests may need longer timeouts
timeout = 300

# Markers
markers =
    smoke: Quick smoke tests for basic functionality
    integration: Integration tests with GDAL
    performance: Performance benchmark tests (NFR1-3)
    edge_case: Edge case and boundary condition tests
    error_recovery: Error recovery and graceful degradation tests

# Logging configuration
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s %(levelname)s %(message)s

# JUnit XML output for CI
junit_family = xunit2
