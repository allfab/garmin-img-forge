# Règles de transformation SMV10 SwissTopo -> Polish Map (production)
version: 1

rulesets:
  # ==========================================================================
  # VÉGÉTATION — Forêt (POLYGON)
  # Source : T65_DKM10_BODENBEDECKUNG
  # ==========================================================================
  - name: "Forêt"
    source_layer: "T65_DKM10_BODENBEDECKUNG"
    rules:
      - match:
          Symbol: "Wald"
        set:
          Type: "0x01"
          EndLevel: "4"

  # ==========================================================================
  # OCCUPATION SOL — Zones d'utilisation (POLYGON)
  # Source : T64_DKM10_NUTZUNGSAREAL
  # ==========================================================================
  - name: "Occupation sol"
    source_layer: "T64_DKM10_NUTZUNGSAREAL"
    rules:
      - match:
          Symbol: "Baumschule"
        set:
          Type: "0x02"
          EndLevel: "0"
      - match:
          Symbol: "Deponieareal"
        set:
          Type: "0x03"
          EndLevel: "0"
      - match:
          Symbol: "Friedhof"
        set:
          Type: "0x04"
          EndLevel: "0"
      - match:
          Symbol: "Obstanlage"
        set:
          Type: "0x05"
          EndLevel: "0"
      - match:
          Symbol: "Oeffentliches Parkareal"
        set:
          Type: "0x06"
          EndLevel: "0"
      - match:
          Symbol: "Reben"
        set:
          Type: "0x07"
          EndLevel: "0"
      - match:
          Symbol: "Schrebergartenareal"
        set:
          Type: "0x08"
          EndLevel: "0"
      - match:
          Symbol: "Spitalareal"
        set:
          Type: "0x09"
          EndLevel: "0"
      - match:
          Symbol: "Unterwerkareal"
        set:
          Type: "0x0A"
          EndLevel: "0"
      # - match:
      #     OBJEKTART: "*"
      #   set:
      #     Type: "XXXXXXXX"
      #     EndLevel: "0"

  # ==========================================================================
  # LOISIRS — Zones de loisirs (POLYGON)
  # Source : T63_DKM10_FREIZEITAREAL
  # ==========================================================================
  - name: "Loisirs"
    source_layer: "T63_DKM10_FREIZEITAREAL"
    rules:
      - match:
          Symbol: "Campingplatzareal"
        set:
          Type: "0x10d"
          EndLevel: "1"
      - match:
          Symbol: "Freizeitanlagenareal"
        set:
          Type: "0x10e"
          EndLevel: "1"
      - match:
          Symbol: "Golfplatzareal"
        set:
          Type: "0x10f"
          EndLevel: "1"

  # ==========================================================================
  # OROGRAPHIE — Courbes de niveau (POLYLINE)
  # Source : T62_DKM10_HOEHENKURVE
  # Pas d'attribut OBJEKTART — wildcard unique
  # ==========================================================================
  - name: "Courbes de niveau"
    source_layer: "T62_DKM10_HOEHENKURVE"
    rules:
      - match:
          Symbol: "Normalkurve (schwarz)"
        set:
          Type: "0x1"
          EndLevel: "1"
          Label: "${HOEHE}"
      - match:
          Symbol: "Normalkurve (braun)"
        set:
          Type: "0x02"
          EndLevel: "1"
          Label: "${HOEHE}"
      - match:
          Symbol: "Zählkurve (schwarz)"
        set:
          Type: "0x03"
          EndLevel: "1"
          Label: "${HOEHE}"
      - match:
          Symbol: "Zählkurve (braun)"
        set:
          Type: "0x04"
          EndLevel: "1"
          Label: "${HOEHE}"

