# Règles overlay cadastre PCI EDIGÉO → types Garmin
# Noms de layers : suffixe _id conforme au driver GDAL EDIGEO (vérifié ogrinfo)
version: 1

rulesets:

  # PARCELLE_id — polygones cadastraux (contour uniquement)
  - name: "Parcelles"
    source_layer: "PARCELLE_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x10d00"
          EndLevel: "0"
          Label: "${IDU}"

  # BATIMENT_id — bâtiments (DUR : 01=dur, 02=léger, 03=FI)
  - name: "Bâtiments"
    source_layer: "BATIMENT_id"
    rules:
      - match:
          DUR: "01"
        set:
          Type: "0x10d01"
          EndLevel: "0"
      - match:
          DUR: "02"
        set:
          Type: "0x10d02"
          EndLevel: "0"
      - match:
          DUR: "03"
        set:
          Type: "0x10d03"
          EndLevel: "0"
      - match:
          DUR: "*"
        set:
          Type: "0x10d01"
          EndLevel: "0"

  # TSURF_id — objets surfaciques divers (SYM précodé)
  - name: "Objets surfaciques divers"
    source_layer: "TSURF_id"
    rules:
      - match:
          SYM: "34"
        set:
          Type: "0x10d10"
          EndLevel: "2"
      - match:
          SYM: "51"
        set:
          Type: "0x10d11"
          EndLevel: "1"
      - match:
          SYM: "52"
        set:
          Type: "0x10d12"
          EndLevel: "1"
      - match:
          SYM: "53"
        set:
          Type: "0x10d13"
          EndLevel: "1"
      - match:
          SYM: "65"
        set:
          Type: "0x10d14"
          EndLevel: "0"
      - match:
          SYM: "66"
        set:
          Type: "0x10d15"
          EndLevel: "0"
      - match:
          SYM: "32"
        set:
          Type: "0x10d16"
          EndLevel: "1"
      - match:
          SYM: "37"
        set:
          Type: "0x10d16"
          EndLevel: "1"

  # SECTION_id — sections cadastrales (repère de navigation)
  - name: "Sections"
    source_layer: "SECTION_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x10d20"
          EndLevel: "3"

  # TRONFLUV_id — tronçons de cours d'eau
  - name: "Cours d'eau"
    source_layer: "TRONFLUV_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x10d21"
          EndLevel: "2"

  # TRONROUTE_id — réseau routier cadastral (absent de certains départements)
  - name: "Voies routières cadastre"
    source_layer: "TRONROUTE_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x10d22"
          EndLevel: "1"

  # LIEUDIT_id — lieux-dits (label TEX)
  - name: "Lieux-dits"
    source_layer: "LIEUDIT_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x10d23"
          EndLevel: "3"
          Label: "${TEX}"

  # ZONCOMMUNI_id — zones de communication / rues (POLYLINE)
  - name: "Zones de communication"
    source_layer: "ZONCOMMUNI_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x10e00"
          EndLevel: "0"
          Label: "${TEX}"

  # TLINE_id — objets linéaires divers (POLYLINE)
  - name: "Objets linéaires divers"
    source_layer: "TLINE_id"
    rules:
      - match:
          SYM: "29"
        set:
          Type: "0x10e02"
          EndLevel: "2"
      - match:
          SYM: "21"
        set:
          Type: "0x10e01"
          EndLevel: "1"
      - match:
          SYM: "*"
        set:
          Type: "0x10e03"
          EndLevel: "1"

  # NUMVOIE_id — numéros de voirie (POI label, absent de certaines communes)
  - name: "Numéros de voirie"
    source_layer: "NUMVOIE_id"
    rules:
      - match:
          OBJECT_RID: "*"
        set:
          Type: "0x6400"
          EndLevel: "0"
          Label: "${TEX}"

  # TPOINT_id — objets ponctuels divers (POI)
  - name: "Objets ponctuels divers"
    source_layer: "TPOINT_id"
    rules:
      - match:
          SYM: "63"
        set:
          Type: "0x6512"
          EndLevel: "1"
      - match:
          SYM: "*"
        set:
          Type: "0x6400"
          EndLevel: "1"
