version: 1

generalize_profiles_path: "./generalize-profiles.yaml"

grid:
  cell_size: 0.225    # identique au scope departement
  overlap: 0.005

inputs:
  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/PARCELLE_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/BATIMENT_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/TSURF_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/SECTION_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/TRONFLUV_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/TRONROUTE_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/LIEUDIT_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/ZONCOMMUNI_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/TLINE_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/TPOINT_id.gpkg"

  - path: "${CADASTRE_DATA_ROOT}/{${ZONES}}/gpkg/NUMVOIE_id.gpkg"

output:
  directory: "${OUTPUT_DIR}/mp/"
  filename_pattern: "CADASTRE-{col:03}-{row:03}.mp"
  overwrite: true
  base_id: ${BASE_ID}

header:
  name: "CADASTRE-{col:03}-{row:03}"
  copyright: "2026 Allfab Studio - DGFiP Plan Cadastral Informatisé 2026"
  levels: "7"
  level0: "24"
  level1: "23"
  level2: "22"
  level3: "21"
  level4: "20"
  level5: "18"
  level6: "16"
  simplify_level: "0"
  tree_size: "1000"
  rgn_limit: "1024"
  transparent: "Y"
  marine: "N"
  preprocess: "F"
  lbl_coding: "9"
  routing: "N"

rules: ./pipeline/configs/overlays/cadastre/garmin-rules.yaml

error_handling: "continue"
