# Profils de simplification pour l'overlay cadastre
# Simplification minimale : le cadastre est au 1:1000, on préserve la précision géométrique.
# Clés = noms de layers GDAL EDIGEO (suffixe _id, vérifiés avec ogrinfo)
version: 1

profiles:
  PARCELLE_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.000005   # ~0.5m — pour les niveaux intermédiaires
      - n: 2
        simplify: 0.00001
      - n: 3
        simplify: 0.00003

  BATIMENT_id:
    levels:
      - n: 0
        simplify: 0.0

  TSURF_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.000005
      - n: 2
        simplify: 0.00002

  SECTION_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.00001
      - n: 2
        simplify: 0.00005
      - n: 3
        simplify: 0.0001

  TRONFLUV_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.000005
      - n: 2
        simplify: 0.00002

  TRONROUTE_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.000005

  LIEUDIT_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.00001
      - n: 2
        simplify: 0.00005
      - n: 3
        simplify: 0.0002

  TLINE_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.000005
      - n: 2
        simplify: 0.00002

  ZONCOMMUNI_id:
    levels:
      - n: 0
        simplify: 0.0

  TPOINT_id:
    levels:
      - n: 0
        simplify: 0.0
      - n: 1
        simplify: 0.0

  NUMVOIE_id:
    levels:
      - n: 0
        simplify: 0.0
