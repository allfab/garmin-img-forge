version: 1

# Règles overview B — couches majeures uniquement.
# EndLevel max = 2 (Level2=10, résolution la plus basse).
# Les routes non listées (Communale, Chemin, Sentier…) n'ont aucune règle
# → ignorées par mpforge → absentes des .mp overview (AC5).
# La première règle qui matche gagne.

rulesets:
  - name: "TRONCON_DE_ROUTE - routes majeures overview"
    source_layer: TRONCON_DE_ROUTE
    rules:
      - match: { CL_ADMIN: Autoroute }
        set: { Type: "0x01", EndLevel: "2", Label: "{NOM_1_G}" }
      - match: { CL_ADMIN: Nationale }
        set: { Type: "0x02", EndLevel: "2", Label: "{NOM_1_G}" }
      - match: { CL_ADMIN: Départementale }
        set: { Type: "0x03", EndLevel: "1", Label: "{NOM_1_G}" }
      # Communale, Chemin, Sentier, Sans objet → pas de règle → ignorés

  - name: "TRONCON_HYDROGRAPHIQUE - cours d'eau principaux"
    source_layer: TRONCON_HYDROGRAPHIQUE
    rules:
      # NUM_ORDRE = ordre de Strahler (1=ruisseau…9=fleuve).
      # Ordres 5-9 = rivières et fleuves principaux (Isère, Drac, Romanche…).
      # Champ NOM_C_EAU = nom canonique du cours d'eau (ex. "la Romanche").
      - match: { NUM_ORDRE: "in:5,6,7,8,9" }
        set: { Type: "0x1f", EndLevel: "2", Label: "{NOM_C_EAU}" }

  - name: "ZONE_DE_VEGETATION - forêts fermées"
    source_layer: ZONE_DE_VEGETATION
    rules:
      # NATURE réelle BDTOPO 2026 : "Forêt fermée de feuillus",
      # "Forêt fermée mixte", "Forêt fermée de conifères" — pas "Forêt fermée" seul.
      # Opérateur ^ (starts-with) couvre les 3 sous-types.
      - match: { NATURE: "^Forêt fermée" }
        set: { Type: "0x50", EndLevel: "1", Label: "" }
