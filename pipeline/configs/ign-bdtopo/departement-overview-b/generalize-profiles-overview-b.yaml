# Profils de simplification pour l'overview B — 3 niveaux (n=0..2).
# Contiguïté n=0..2 garantie (aucun trou, fill_level_gaps non sollicité).
# Pas de branche when: — le filtrage est assuré par garmin-rules.yaml
# (seules les routes majeures atteignent ce profil).

profiles:
  TRONCON_DE_ROUTE:
    levels:
      - { n: 0, simplify: 0.00005 }
      - { n: 1, simplify: 0.0005 }
      - { n: 2, simplify: 0.001 }   # borne max mpforge = 0.001 (≈ 110 m)

  TRONCON_HYDROGRAPHIQUE:
    levels:
      - { n: 0, simplify: 0.00005 }
      - { n: 1, simplify: 0.0005 }
      - { n: 2, simplify: 0.001 }

  ZONE_DE_VEGETATION:
    levels:
      - { n: 0, simplify: 0.0001 }
      - { n: 1, simplify: 0.001 }
