version: 1

# Option B — overview map séparée (approche Garmin standard).
# 3 niveaux hardware Level0=14 / Level1=12 / Level2=10.
# Règle cGPSmapper doc 36/42 : Level0 overview (14) < Level6 détail (16) ✓
# Aucune clé overview_levels — config 3L standard pure.
generalize_profiles_path: "generalize-profiles-overview-b.yaml"

grid:
  # 2.0° ≈ 220 km en latitude : pour D038 (Isère, ~1°×1.3°) → 1 tuile.
  # Pour les grands départements (Gironde ~2.0°, Landes ~2.2°) → 2 tuiles.
  # Réduire à 1.0 si le log mpforge rapporte > 500 features/tuile.
  cell_size: 2.0
  overlap: 0.05

inputs:
  # Seulement les couches majeures pour l'overview

  - path: "${DATA_ROOT}/{${ZONES}}/TRANSPORT/TRONCON_DE_ROUTE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  - path: "${DATA_ROOT}/{${ZONES}}/HYDROGRAPHIE/TRONCON_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  - path: "${DATA_ROOT}/{${ZONES}}/OCCUPATION_DU_SOL/ZONE_DE_VEGETATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

output:
  directory: "${OUTPUT_DIR}/mp-overview/"
  filename_pattern: "BDTOPO-OV-B-{col:03}-{row:03}.mp"
  overwrite: true
  base_id: ${BASE_ID_OV}   # distinct des tuiles détail (BASE_ID + 1000)

header:
  name: "BDTOPO-OV-B-{col:03}-{row:03}"
  copyright: "2026 Allfab Studio - IGN BDTOPO 2025 - Les contributeurs de la communauté OpenStreetMap"
  levels: "3"
  level0: "14"
  level1: "12"
  level2: "10"
  simplify_level: "0"
  tree_size: "1000"
  rgn_limit: "1024"
  transparent: "N"
  marine: "N"
  preprocess: "F"
  lbl_coding: "9"   # CP1252 — identique au scope departement/sources.yaml
  routing: "N"

rules: pipeline/configs/ign-bdtopo/departement-overview-b/garmin-rules.yaml

error_handling: "continue"
