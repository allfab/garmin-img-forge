version: 1

grid:
  cell_size: 0.15       # ~16.5 km par tuile (recommandé pour mkgmap/Garmin)
  overlap: 0.005        # Léger chevauchement pour éviter les artefacts aux bords

inputs:
  # ==========================================================================
  # TRANSPORT (4 couches — FME 01-TRANSPORT)
  # ==========================================================================

  # Routes (couche principale — la plus volumineuse)
  - path: "${DATA_ROOT}/TRANSPORT/TRONCON_DE_ROUTE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Voies ferrées
  - path: "${DATA_ROOT}/TRANSPORT/TRONCON_DE_VOIE_FERREE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Pistes d'aérodrome
  - path: "${DATA_ROOT}/TRANSPORT/PISTE_D_AERODROME.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Transport par câble (téléphériques, télésièges)
  - path: "${DATA_ROOT}/TRANSPORT/TRANSPORT_PAR_CABLE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # ADMINISTRATIF / LIEUX NOMMÉS (2 couches — FME 01-TRANSPORT chef-lieu)
  # ==========================================================================

  # Communes (POI chef-lieu + polygone limites)
  - path: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Zones d'habitation
  - path: "${DATA_ROOT}/LIEUX_NOMMES/ZONE_D_HABITATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    generalize:
      smooth: "chaikin"
      iterations: 1
      simplify: 0.00003

  # ==========================================================================
  # HYDROGRAPHIE (3 couches — FME 04-HYDROGRAPHIE)
  # ==========================================================================

  # NOTE : Utiliser TRONCON_HYDROGRAPHIQUE (pas COURS_D_EAU)
  - path: "${DATA_ROOT}/HYDROGRAPHIE/TRONCON_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # NOTE : Utiliser SURFACE_HYDROGRAPHIQUE (pas PLAN_D_EAU)
  - path: "${DATA_ROOT}/HYDROGRAPHIE/SURFACE_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Détails hydrographiques (POI : sources, cascades, etc.)
  - path: "${DATA_ROOT}/HYDROGRAPHIE/DETAIL_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # BATI (7 couches — FME 06-BATI + 07-OROGRAPHIE)
  # ==========================================================================

  # Bâtiments (polygon — couche volumineuse)
  - path: "${DATA_ROOT}/BATI/BATIMENT.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Cimetières
  - path: "${DATA_ROOT}/BATI/CIMETIERE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Constructions linéaires (murs, digues)
  - path: "${DATA_ROOT}/BATI/CONSTRUCTION_LINEAIRE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Constructions ponctuelles (châteaux d'eau, monuments)
  - path: "${DATA_ROOT}/BATI/CONSTRUCTION_PONCTUELLE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Pylônes (POI)
  - path: "${DATA_ROOT}/BATI/PYLONE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Terrains de sport
  - path: "${DATA_ROOT}/BATI/TERRAIN_DE_SPORT.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Lignes orographiques (FME 07-OROGRAPHIE)
  - path: "${DATA_ROOT}/BATI/LIGNE_OROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # VEGETATION (1 couche — FME 05-VEGETATION)
  # ==========================================================================

  # Zones de végétation (forêts, haies — couche volumineuse)
  - path: "${DATA_ROOT}/OCCUPATION_DU_SOL/ZONE_DE_VEGETATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # SERVICES & ACTIVITÉS (2 couches — FME 03-SERVICES)
  # ==========================================================================

  # Zones d'activité ou d'intérêt (zones industrielles, touristiques)
  - path: "${DATA_ROOT}/SERVICES_ET_ACTIVITES/ZONE_D_ACTIVITE_OU_D_INTERET.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # Lignes électriques
  - path: "${DATA_ROOT}/SERVICES_ET_ACTIVITES/LIGNE_ELECTRIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # ZONES RÉGLEMENTÉES (1 couche — FME 02-ZONES_REG)
  # ==========================================================================

  # Forêts publiques (ONF)
  - path: "${DATA_ROOT}/ZONES_REGLEMENTEES/FORET_PUBLIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # TOPONYMIE (1 couche — FME 08-TOPONYMIE)
  # ==========================================================================

  # Toponymie (POI — 162 branches sur 10 catégories CLASSE)
  - path: "${DATA_ROOT}/LIEUX_NOMMES/TOPONYMIE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"

  # ==========================================================================
  # COURBES DE NIVEAU (produit IGN séparé)
  # Polylignes 3D, équidistance 5m filtrée à 10m via attribute_filter
  # ==========================================================================
  - path: "${CONTOURS_DATA_ROOT}/**/COURBE_*.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    attribute_filter: "CAST(ALTITUDE AS INTEGER) = (CAST(ALTITUDE AS INTEGER) / 10) * 10"
    layer_alias: "COURBE"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500  # mètres, dans le SRS source (EPSG:2154)

  # ==========================================================================
  # OSM — POIs et features naturelles (Geofabrik PBF → GPKG)
  #
  # Les PBF sont pré-convertis en GPKG par le script download-bdtopo.sh
  # (option --with-osm). Les GPKG ont un accès aléatoire, éliminant les
  # erreurs "Too many features accumulated" du driver OSM sur les gros PBF.
  #
  # Le chemin glob intègre automatiquement tous les GPKG du sous-dossier gpkg/.
  # Le spatial_filter restreint les features à l'emprise communale + buffer.
  # ==========================================================================

  # --- Amenity POIs (restaurants, pharmacies, parking, etc.) ---
  - path: "${OSM_DATA_ROOT}/gpkg/*-amenity-points.gpkg"
    layer_alias: "osm_amenity"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # --- Shop POIs (boulangeries, supermarchés, etc.) ---
  - path: "${OSM_DATA_ROOT}/gpkg/*-shop-points.gpkg"
    layer_alias: "osm_shop"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # --- Natural features linéaires (arêtes, crêtes, falaises) ---
  - path: "${OSM_DATA_ROOT}/gpkg/*-natural-lines.gpkg"
    layer_alias: "osm_natural_lines"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # --- Natural features ponctuelles (grottes, rochers, dolines) ---
  - path: "${OSM_DATA_ROOT}/gpkg/*-natural-points.gpkg"
    layer_alias: "osm_natural_points"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # --- Tourism viewpoints ---
  - path: "${OSM_DATA_ROOT}/gpkg/*-tourism-points.gpkg"
    layer_alias: "osm_tourism"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # ==========================================================================
  # RANDONNÉE — Sentiers de Grande Randonnée (GR)
  # Source : pipeline/data/randonnee/FRANCE-GR.shp (tracké dans git)
  # Déjà en EPSG:4326 — pas de reprojection nécessaire
  # Attributs : NAME (label), MP_TYPE (type Garmin), EndLevel
  # ==========================================================================
  - path: "${RANDO_DATA_ROOT}/FRANCE-GR.shp"
    layer_alias: "FRANCE_GR"
    spatial_filter:
      source: "${DATA_ROOT}/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

output:
  directory: "${OUTPUT_DIR}/mp/"
  filename_pattern: "BDTOPO-{col:03}-{row:03}.mp"
  overwrite: true
  base_id: ${BASE_ID}      # Auto-génère des IDs uniques par tuile : ex. 00380001, 00380002, etc.

# Header MP — métadonnées écrites dans chaque tuile .mp
# Le champ 'name' supporte les variables {col}, {row} (0-based), {seq} (1-based)
# avec padding optionnel {col:03}
header:
  name: "BDTOPO-{col:03}-{row:03}"
  copyright: "2026 Allfab Studio - IGN BDTOPO 2025 - Les contributeurs de la communauté OpenStreetMap"
  levels: "5"
  level0: "24"
  level1: "22"
  level2: "20"
  level3: "18"
  level4: "16"
  simplify_level: "0"
  tree_size: "1000"
  rgn_limit: "1024"
  transparent: "N"
  marine: "N"
  preprocess: "F"
  lbl_coding: "9"
  routing: "Y"

# Règles de transformation BDTOPO → types Garmin
rules: pipeline/configs/ign-bdtopo/garmin-rules.yaml


error_handling: "continue"

# =============================================================================
# OPTIONS AVANCÉES (décommenter si nécessaire)
# =============================================================================

# Filtre bbox (WGS84) — exemple pour l'Isère :
# filters:
#   bbox: [5.0, 44.6, 6.4, 45.9]

# Filtre bbox France métropolitaine complète :
# filters:
#   bbox: [-5.5, 41.2, 9.7, 51.1]
