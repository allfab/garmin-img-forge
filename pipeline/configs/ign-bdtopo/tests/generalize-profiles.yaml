# Tech-spec #2 — profils de simplification multi-niveaux BDTOPO pour mpforge.
#
# CATALOGUE 7L PARTAGÉ — header cible 24/23/22/21/20/18/16 (cf. chaque sources.yaml).
#
# Chaque profil est indexé par `source_layer` (nom de couche BDTOPO). mpforge
# résout le profil au chargement de `sources.yaml` via le champ racine
# `generalize_profiles_path`.
#
# Paliers contigus n=0..6 (7 niveaux complets). Les trous d'index éventuels
# sont comblés automatiquement par mpforge (fill_level_gaps) en clonant le
# palier précédent — condition sine qua non du rendu sur Alpha 100 et autres
# firmwares Garmin sensibles à la contiguïté des sections Data0..DataN du .mp.
#
# Sémantique des clés :
#   - n         : index de niveau de détail dans MpHeader.levels (0 = le plus
#                 détaillé = émis en Data0= ; 6 = émis en Data6=).
#   - smooth    : "chaikin" uniquement pour l'instant (optionnel).
#   - iterations: itérations de Chaikin (borne [0, 5]).
#   - simplify  : tolérance Douglas-Peucker en degrés WGS84 (borne [0, 0.001],
#                 ≈ 110 m). 0.00002 ≈ 2 m ; 0.00005 ≈ 5 m ; 0.00020 ≈ 22 m.
#
# Contraintes fail-fast validées par `load_config` :
#   - Toute couche routable (is_routable_layer → TRONCON_DE_ROUTE) doit
#     déclarer `n: 0` dans chaque branche visible (default ET chaque `when`).
#     Cf. Tech-spec #1 F4 : routing exige Data0 strict.
#   - Un même `source_layer` ne peut pas apparaître à la fois inline dans
#     `sources.yaml` (champ `generalize:`) et ici (conflit rejeté).
#
# BATIMENT : volontairement ABSENT du catalogue. Les bâtiments doivent rester
# intacts (Data0= seul, géométrie brute du shapefile). cf. AC12.
#
# NOTE ARCHITECTURALE : imgforge n'applique plus de DP automatique aux polygones
# (suppression du fallback auto_epsilon dans poly_epsilon). La simplification des
# polygones est entièrement déléguée à mpforge via ces profils. Les polylignes
# conservent l'auto-DP imgforge (pas de contrainte topologique entre features).

profiles:
  TRONCON_HYDROGRAPHIQUE:
    levels:
      - { n: 0, simplify: 0.00005 }
      - { n: 1, simplify: 0.00006 }
      - { n: 2, simplify: 0.00008 }
      - { n: 3, simplify: 0.00010 }
      - { n: 4, simplify: 0.00030 }
      - { n: 5, simplify: 0.00080 }
      - { n: 6, simplify: 0.00100 }

  ZONE_DE_VEGETATION:
    levels:
      - { n: 0, smooth: chaikin, iterations: 1, simplify: 0.00005 }
      - { n: 1, simplify: 0.00006 }
      - { n: 2, simplify: 0.00008 }
      - { n: 3, simplify: 0.00010 }
      - { n: 4, simplify: 0.00030 }
      - { n: 5, simplify: 0.00080 }
      - { n: 6, simplify: 0.00100 }

  TRONCON_DE_ROUTE:
    # topology: true — vertices partagés aux nœuds d'intersection ancrés par VW
    # topologique (même contrat que COMMUNE). Seul simplify_vw autorisé avec
    # topology: true. Data0 strict présent dans chaque branche when (contrainte F4).
    #
    # n=0..2 : ultra-conservateurs (proche terrain, GPS 25–1500 m).
    # n=3..4 : re-différenciés par classe (à ~3–6 km, 5–30 m de déviation est sub-pixel).
    # n=5..6 : non rendus en france-quadrant (EndLevel max routes = 4) — conservés
    #          pour compatibilité catalogue partagé avec futurs scopes EndLevel=6.
    topology: true
    when:
      - field: CL_ADMIN
        values: [Autoroute, Nationale]
        levels:
          - { n: 0, simplify_vw: 0.000001 }
          - { n: 1, simplify_vw: 0.000002 }
          - { n: 2, simplify_vw: 0.000003 }
          - { n: 3, simplify_vw: 0.000010 }
          - { n: 4, simplify_vw: 0.000100 }
          - { n: 5, simplify_vw: 0.000300 }
          - { n: 6, simplify_vw: 0.000700 }
      - field: CL_ADMIN
        values: [Départementale]
        levels:
          - { n: 0, simplify_vw: 0.000001 }
          - { n: 1, simplify_vw: 0.000002 }
          - { n: 2, simplify_vw: 0.000003 }
          - { n: 3, simplify_vw: 0.000020 }
          - { n: 4, simplify_vw: 0.000150 }
          - { n: 5, simplify_vw: 0.000400 }
          - { n: 6, simplify_vw: 0.000800 }
      - field: CL_ADMIN
        values: [Communale, "Sans objet"]
        levels:
          - { n: 0, simplify_vw: 0.000001 }
          - { n: 1, simplify_vw: 0.000002 }
          - { n: 2, simplify_vw: 0.000003 }
          - { n: 3, simplify_vw: 0.000035 }
          - { n: 4, simplify_vw: 0.000200 }
          - { n: 5, simplify_vw: 0.000500 }
          - { n: 6, simplify_vw: 0.001000 }
      - field: CL_ADMIN
        values: [Chemin, Sentier]
        levels:
          - { n: 0, simplify_vw: 0.000001 }
          - { n: 1, simplify_vw: 0.000002 }
          - { n: 2, simplify_vw: 0.000003 }
          - { n: 3, simplify_vw: 0.000050 }
          - { n: 4, simplify_vw: 0.000250 }
          - { n: 5, simplify_vw: 0.000600 }
          - { n: 6, simplify_vw: 0.001000 }
    levels:
      - { n: 0, simplify_vw: 0.000001 }
      - { n: 1, simplify_vw: 0.000002 }
      - { n: 2, simplify_vw: 0.000003 }
      - { n: 3, simplify_vw: 0.000035 }
      - { n: 4, simplify_vw: 0.000200 }
      - { n: 5, simplify_vw: 0.000500 }
      - { n: 6, simplify_vw: 0.001000 }

  COURBE:
    levels:
      - { n: 0, simplify: 0.00008 }
      - { n: 1, simplify: 0.00010 }
      - { n: 2, simplify: 0.00011 }
      - { n: 3, simplify: 0.00014 }
      - { n: 4, simplify: 0.00030 }
      - { n: 5, simplify: 0.00100 }
      - { n: 6, simplify: 0.00100 }

  CONSTRUCTION_LINEAIRE:
    levels:
      - { n: 0, simplify: 0.00003 }
      - { n: 1, simplify: 0.00004 }
      - { n: 2, simplify: 0.00006 }
      - { n: 3, simplify: 0.00010 }
      - { n: 4, simplify: 0.00030 }
      - { n: 5, simplify: 0.00100 }
      - { n: 6, simplify: 0.00100 }

  SURFACE_HYDROGRAPHIQUE:
    levels:
      - { n: 0, smooth: chaikin, iterations: 1, simplify: 0.00005 }
      - { n: 1, simplify: 0.00007 }
      - { n: 2, simplify: 0.00008 }
      - { n: 3, simplify: 0.00012 }
      - { n: 4, simplify: 0.00030 }
      - { n: 5, simplify: 0.00100 }
      - { n: 6, simplify: 0.00100 }

  ZONE_D_HABITATION:
    levels:
      - { n: 0, smooth: chaikin, iterations: 1, simplify: 0.00005 }
      - { n: 1, simplify: 0.00006 }
      - { n: 2, simplify: 0.00008 }
      - { n: 3, simplify: 0.00012 }
      - { n: 4, simplify: 0.00030 }
      - { n: 5, simplify: 0.00100 }
      - { n: 6, simplify: 0.00100 }

  TRONCON_DE_VOIE_FERREE:
    # EndLevel=4 pour tous les types (LGV, principale, service, tramway…).
    # Paliers n=0..4 uniquement — imgforge ne rend pas au-delà de EndLevel.
    levels:
      - { n: 0, simplify: 0.00005 }
      - { n: 1, simplify: 0.00008 }
      - { n: 2, simplify: 0.00012 }
      - { n: 3, simplify: 0.00020 }
      - { n: 4, simplify: 0.00035 }

  COMMUNE:
    # topology: true — frontières entre communes partagent des vertices bit-exacts
    # (même shapefile BDTOPO). VW topologique intra-cellule garantit l'absence de
    # trous/chevauchements à tous les niveaux de zoom.
    topology: true
    levels:
      - { n: 0, simplify_vw: 0.00003 }
      - { n: 1, simplify_vw: 0.00007 }
      - { n: 2, simplify_vw: 0.00013 }
      - { n: 3, simplify_vw: 0.00020 }
      - { n: 4, simplify_vw: 0.00040 }
      - { n: 5, simplify_vw: 0.00080 }
      - { n: 6, simplify_vw: 0.00150 }
