  # Conditions AND : CLASSE + NATURE (chaque regle doit avoir les deux)
  # Label source : GRAPHIE (FME renomme GRAPHIE→NAME)
  # EndLevel : 2 pour toutes les regles, MPBITLEVEL=22
  # Total : 162 regles actives (+ 11 categories commentees en fin de bloc)
