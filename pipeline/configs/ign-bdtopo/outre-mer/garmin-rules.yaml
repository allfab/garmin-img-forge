          CLASSE: "Aérodrome"
          NATURE: "*"
        set:
          Type: "0x02d0b"
          EndLevel: "4"
          Label: "${GRAPHIE}"

      # ------------------------------------------------------------------
      # Categorie 2 : Cimetiere (simplifie en 1 regle wildcard)
      # FME: 3 NATURE + catch-all, toutes mappent a 0x06403
      # Optimisation : 1 seule regle CLASSE="Cimetiere" + NATURE="*"
