      # ------------------------------------------------------------------
      # Categorie 1 : Aerodrome (3 NATURE + catch-all 0x02d0b)
      # FME: 08-TOPONYMIE.fmw / TestFilter CLASSE="Aerodrome"
      # ------------------------------------------------------------------

      # 1. Aerodrome
