        set:
          Type: "0x13309"
          EndLevel: "0"
          Label: "${TOPONYME}"

      # 4. Mur
      - match:
          NATURE: "Mur"
        set:
          Type: "0x13308"
          EndLevel: "0"
          Label: "${TOPONYME}"

      # 5. Mur anti-bruit
      - match:
