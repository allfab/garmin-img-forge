          natural: "cliff"
        set:
          Type: "0x11a01"
          EndLevel: "2"
          Label: "${name}"

  # ==========================================================================
  # OSM — Natural features ponctuelles (grottes, rochers, dolines)
  # Source : OpenStreetMap via Geofabrik PBF — couche "points"
  # 4 types : cave_entrance, rock, sinkhole, cave (default)
  # cave_entrance doit matcher avant le wildcard (first-match-wins)
  # ==========================================================================
  - name: "OSM Natural POIs"
    source_layer: "osm_natural_points"
    rules:
      - match:
          natural: "cave_entrance"
        set:
          Type: "0x15301"
          EndLevel: "2"
          Label: "${name}"

      - match:
          natural: "rock"
        set:
          Type: "0x06614"
          EndLevel: "2"
          Label: "${name}"

      - match:
          natural: "sinkhole"
        set:
          Type: "0x11509"
          EndLevel: "2"
          Label: "${name}"

      # Default — catch-all pour natural=cave (tag rare mais existant dans OSM,
      # distinct de cave_entrance) et tout autre type natural non mappé
      - match:
          natural: "*"
        set:
          Type: "0x15300"
          EndLevel: "2"
          Label: "${name}"

  # ==========================================================================
  # OSM — Tourism viewpoints (points de vue)
  # Source : OpenStreetMap via Geofabrik PBF — couche "points"
  # Note : le type 0x16 (Scenic Area/Viewpoint) est le type Garmin standard
  # pour les points de vue, distinct du 0x15300 utilisé pour les grottes
  # ==========================================================================
  - name: "OSM Tourism Viewpoints"
    source_layer: "osm_tourism"
    rules:
      - match:
          tourism: "viewpoint"
        set:
          Type: "0x16"
          EndLevel: "2"
          Label: "${name}"

  # ==========================================================================
  # RANDONNÉE — Sentiers de Grande Randonnée (GR)
  # Source : pipeline/data/hiking-trails/FRANCE-GR.shp (fichier fixe, EPSG:4326)
  # Type et EndLevel portés directement par les attributs du shapefile
  # ==========================================================================
  - name: "Sentiers GR"
    source_layer: "FRANCE_GR"
    rules:
      - match:
          NAME: "*"
        set:
          Type: "0x10f04"
          EndLevel: "4"
          Label: "${NAME}"

      # Fallback — GR sans nom (NAME vide ou absent)
      - match:
          NAME: ""
        set:
          Type: "0x10f04"
          EndLevel: "4"

  # ==========================================================================
  # CADASTRE — Piscines privées (TSURF_id, SYM=65)
  # Source : pipeline/data/cadastre/{ZONES}/gpkg/TSURF_id.gpkg
  # Pas de Label (TSURF_id ne porte pas de nom).
  # ==========================================================================
  - name: "Piscines cadastre"
    source_layer: "TSURF_id"
    rules:
      - match:
          SYM: "65"
        set:
          Type: "0x1101e"
          EndLevel: "0"

  # ==========================================================================
  # SEA — Polygones de mer (bounds D974, EPSG:4326)
  # Source : pipeline/resources/bounds/D974/D974_SEA.shp
  # Catch-all : toutes les features reçoivent le type mer (0x32).
  # ==========================================================================
  - name: "Mer (SEA bounds)"
    source_layer: "SEA"
    rules:
      - match:
          NAME: "*"
        set:
          Type: "0x32"
          EndLevel: "6"
