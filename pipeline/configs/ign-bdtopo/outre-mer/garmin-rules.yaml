      # 9. Phare
      - match:
          NATURE: "Phare"
        set:
          Type: "0x10101"
          EndLevel: "0"
          Label: "${TOPONYME}"

      # 10. Puits d'hydrocarbures
      - match:
          NATURE: "Puits d'hydrocarbures"
        set:
          Type: "0x0640d"
          EndLevel: "0"
          Label: "${TOPONYME}"

      # 11. Torchère
      - match:
          NATURE: "Torchère"
        set:
          Type: "0x11108"
          EndLevel: "0"
          Label: "${TOPONYME}"

      # 12. Transformateur
      - match:
          NATURE: "Transformateur"
        set:
          Type: "0x11506"
          EndLevel: "0"
          Label: "${TOPONYME}"

  # ==========================================================================
  # BATI — Pylones (POI)
  # Source FME : 06-BATI.fmw / AttributeCreator PYLONE (statique)
  # 1 regle wildcard — Type 0x11503 (ECART avec doc : doc dit 0x11500)
  # Label : Pas de Label (pas de champ NAME dans FME)
  # ==========================================================================
  - name: "Pylones"
    source_layer: "PYLONE"
    rules:
      # 1. Toute feature (mapping statique)
      - match:
          NATURE: "*"
        set:
          Type: "0x11503"
          EndLevel: "0"

  # ==========================================================================
  # BATI — Terrains de sport (POLYGON)
  # Source FME : 06-BATI.fmw / AttributeManager TERRAIN_DE_SPORT
  # 5 regles NATURE + catch-all 0x1090d, EndLevel variable (2 ou 4)
  # Label : ${NAT_DETAIL} (FME renomme NAT_DETAIL→NAME)
  # ==========================================================================
  - name: "Terrains de sport"
    source_layer: "TERRAIN_DE_SPORT"
    label_case: "title"
    rules:
