version: 1

# Tech-spec overview wide-zoom — fixture démo (non activée par défaut).
#
# Exemple opérationnel d'un scope `departement/` étendu à 10 paliers Polish Map
# (7 standards + 3 overview bits 14/12/10). Sert de harnais de test et de
# référence pour la Phase 2 de `imgforge` (consommation des `Data7/8/9`).
#
# Les scopes production (`departement/`, `france-quadrant/`, `outre-mer/*/`)
# restent intouchés (header 7L standard) ; cette fixture vit à côté pour être
# exécutable indépendamment :
#   mpforge build --config pipeline/configs/ign-bdtopo/departement-overview-demo/sources.yaml

generalize_profiles_path: "generalize-profiles-overview.yaml"

grid:
  cell_size: 0.225
  overlap: 0.005

inputs:
  # Routes — seule couche promue jusqu'au palier le plus large (n=9, bits=10).
  - path: "${DATA_ROOT}/{${ZONES}}/TRANSPORT/TRONCON_DE_ROUTE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Hydro principale — promue à n=8 (bits=12).
  - path: "${DATA_ROOT}/{${ZONES}}/HYDROGRAPHIE/TRONCON_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Végétation — promue à n=7 (bits=14), simplification agressive.
  - path: "${DATA_ROOT}/{${ZONES}}/OCCUPATION_DU_SOL/ZONE_DE_VEGETATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

output:
  directory: "${OUTPUT_DIR}/mp/"
  filename_pattern: "BDTOPO-OVERVIEW-{col:03}-{row:03}.mp"
  overwrite: true
  base_id: ${BASE_ID}

# Header étendu : 7 paliers standards conservés, extension overview ajoutée
# dynamiquement par mpforge via `overview_levels.header_extension` ci-dessous.
# `levels: "7"` reste la déclaration standard ; `prepare_overview_levels`
# réécrit la clé à "10" et alimente Level7/8/9 au chargement.
header:
  name: "BDTOPO-OVERVIEW-{col:03}-{row:03}"
  copyright: "2026 Allfab Studio - IGN BDTOPO 2025 - Les contributeurs de la communauté OpenStreetMap"
  levels: "7"
  level0: "24"
  level1: "23"
  level2: "22"
  level3: "21"
  level4: "20"
  level5: "18"
  level6: "16"
  simplify_level: "0"
  tree_size: "1000"
  rgn_limit: "1024"
  transparent: "N"
  marine: "N"
  preprocess: "F"
  lbl_coding: "9"
  routing: "Y"

rules: pipeline/configs/ign-bdtopo/departement-overview-demo/garmin-rules.yaml

error_handling: "continue"

# Tech-spec overview wide-zoom — opt-in strict : extension du header à 10
# paliers + règles de promotion par couche. Absent des 3 scopes production.
overview_levels:
  header_extension: [14, 12, 10]
  promotion:
    TRONCON_DE_ROUTE:
      - match: { CL_ADMIN: [Autoroute, Nationale] }
        promote_to: 9
      - match: { CL_ADMIN: [Départementale] }
        promote_to: 8
    TRONCON_HYDROGRAPHIQUE:
      - match: { CLASSE: ["Cours d'eau principal"] }
        promote_to: 8
    ZONE_DE_VEGETATION:
      - match: { NATURE: ["Forêt fermée"] }
        promote_to: 7
