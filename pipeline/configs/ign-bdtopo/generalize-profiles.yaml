# Tech-spec #2 — profils de simplification multi-niveaux BDTOPO pour mpforge.
#
# Chaque profil est indexé par `source_layer` (nom de couche BDTOPO). mpforge
# résout le profil au chargement de `sources.yaml` via le champ racine
# `generalize_profiles_path: "../generalize-profiles.yaml"`.
#
# Sémantique des clés (cf. tech-spec-mpforge-multi-data-bdtopo-profiles.md) :
#   - n         : index de niveau de détail dans MpHeader.levels (0 = le plus
#                 détaillé = émis en Data0=, 2 = émis en Data2=, etc.).
#   - smooth    : "chaikin" uniquement pour l'instant (optionnel).
#   - iterations: itérations de Chaikin (borne [0, 5]).
#   - simplify  : tolérance Douglas-Peucker en degrés WGS84 (borne [0, 0.001],
#                 ≈ 110 m). 0.00002 ≈ 2 m ; 0.00005 ≈ 5 m ; 0.00020 ≈ 22 m.
#
# Contraintes fail-fast validées par `load_config` :
#   - Toute couche routable (is_routable_layer → TRONCON_DE_ROUTE) doit
#     déclarer `n: 0` dans chaque branche visible (default ET chaque `when`).
#     Cf. Tech-spec #1 F4 : routing exige Data0 strict.
#   - Un même `source_layer` ne peut pas apparaître à la fois inline dans
#     `sources.yaml` (champ `generalize:`) et ici (conflit rejeté).
#
# BATIMENT : volontairement ABSENT du catalogue. Les bâtiments doivent rester
# intacts (Data0= seul, géométrie brute du shapefile). cf. AC12.

profiles:
  TRONCON_HYDROGRAPHIQUE:
    levels:
      - { n: 0, simplify: 0.00005 }   # ~5.5 m — conservateur
      - { n: 2, simplify: 0.00020 }   # ~22 m  — zoom moyen

  ZONE_DE_VEGETATION:
    levels:
      - { n: 0, smooth: chaikin, iterations: 1, simplify: 0.00005 }
      - { n: 2, simplify: 0.00020 }

  TRONCON_DE_ROUTE:
    # Dispatch conditionnel par CL_ADMIN. Premier match gagne (ordre YAML).
    # Tolérances n=0 volontairement ≤ 0.00010° (~11 m) pour préserver la
    # connexité d'intersections (cf. AC16).
    when:
      - field: CL_ADMIN
        values: [Autoroute, Nationale]
        levels:
          - { n: 0, simplify: 0.00002 }   # ~2 m — préservation routing max
          - { n: 2, simplify: 0.00008 }
      - field: CL_ADMIN
        values: [Départementale]
        levels:
          - { n: 0, simplify: 0.00003 }
          - { n: 2, simplify: 0.00010 }
      - field: CL_ADMIN
        values: [Communale, "Sans objet"]
        levels:
          - { n: 0, simplify: 0.00005 }
          - { n: 2, simplify: 0.00015 }
      - field: CL_ADMIN
        values: [Chemin, Sentier]
        levels:
          - { n: 0, simplify: 0.00010 }
          - { n: 2, simplify: 0.00030 }
    levels:
      # Fallback par défaut si aucune `when` ne matche.
      - { n: 0, simplify: 0.00005 }
      - { n: 2, simplify: 0.00015 }

  COURBE:
    levels:
      - { n: 0, simplify: 0.00008 }
      - { n: 2, simplify: 0.00025 }
