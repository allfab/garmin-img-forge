version: 1

# Configuration minimale pour la démonstration — build rapide sur Grenoble et environs.

grid:
  cell_size: 0.5       # Tuile unique (~55 km)
  overlap: 0.005

# Bbox WGS84 — Grenoble et environs (~40 × 30 km)
filters:
  bbox: [5.5, 45.1, 5.9, 45.4]

inputs:
  - path: "./pipeline/data/bdtopo/2026/v2026.03/D038/TRANSPORT/TRONCON_DE_ROUTE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  - path: "./pipeline/data/bdtopo/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  - path: "./pipeline/data/bdtopo/2026/v2026.03/D038/HYDROGRAPHIE/TRONCON_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  - path: "./pipeline/data/bdtopo/2026/v2026.03/D038/OCCUPATION_DU_SOL/ZONE_DE_VEGETATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

output:
  directory: "./pipeline/output/demo/mp/"
  filename_pattern: "DEMO-{col:03}-{row:03}.mp"
  overwrite: true
  base_id: 99

header:
  name: "DEMO-{col:03}-{row:03}"
  copyright: "2026 Allfab Studio - Demo Grenoble"
  levels: "7"
  level0: "24"
  level1: "23"
  level2: "22"
  level3: "21"
  level4: "20"
  level5: "18"
  level6: "16"
  simplify_level: "0"
  tree_size: "1000"
  rgn_limit: "1024"
  transparent: "N"
  marine: "N"
  preprocess: "F"
  lbl_coding: "9"
  routing: "Y"
  elevation: "M"

generalize_profiles_path: "./generalize-profiles.yaml"

rules: ./pipeline/configs/demo/garmin-rules.yaml

error_handling: "continue"
