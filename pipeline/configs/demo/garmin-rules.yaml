# Règles de transformation BDTOPO → Polish Map (démo)
version: 1

rulesets:
  # ==========================================================================
  # TRANSPORT — Tronçons de route (POLYLINE)
  # match: champ/valeur — préfixe ! pour la négation
  # set:  Type Garmin, EndLevel (0=max détail, 6=vue large), Label optionnel
  # ==========================================================================
  - name: "Routes"
    source_layer: "TRONCON_DE_ROUTE"
    rules:
      # 1. Autoroute (toute NATURE)
      - match:
          CL_ADMIN: "Autoroute"
        set:
          Type: "0x01"
          EndLevel: "6"
          Label: "~[0x04]${NUMERO}"

      # 2. Nationale (hors Rond-point) — préfixe ! = négation
      - match:
          CL_ADMIN: "Nationale"
          NATURE: "!Rond-point"
        set:
          Type: "0x04"
          EndLevel: "4"
          Label: "~[0x05]${NUMERO}"

      # 3. Chemin
      - match:
          CL_ADMIN: "Chemin"
        set:
          Type: "0x0a"
          EndLevel: "1"

      # 4. Sentier (niveau détail seulement)
      - match:
          CL_ADMIN: "Sentier"
        set:
          Type: "0x16"
          EndLevel: "0"

      # 5. Défaut — toutes autres routes (catch-all)
      - match:
          CL_ADMIN: "*"
        set:
          Type: "0x06"
          EndLevel: "2"

  # ==========================================================================
  # HYDROGRAPHIE — Tronçons (POLYLINE)
  # ==========================================================================
  - name: "Hydrographie linéaire"
    source_layer: "TRONCON_HYDROGRAPHIQUE"
    rules:
      - match:
          PERSISTANCE: "Permanent"
        set:
          Type: "0x1f"
          EndLevel: "4"
          Label: "${NOM_C_EAU}"

      # Défaut — cours d'eau intermittent (catch-all)
      - match:
          PERSISTANCE: "*"
        set:
          Type: "0x26"
          EndLevel: "2"

  # ==========================================================================
  # ADMINISTRATIF — Communes (POLYGON)
  # ==========================================================================
  - name: "Communes"
    source_layer: "COMMUNE"
    label_case: "title"
    rules:
      - match:
          NOM: "*"
        set:
          Type: "0x54"
          EndLevel: "6"
          Label: "${NOM}"
          CountryName: "France~[0x1d]FRA"
          CityName: "${NOM}"
          Zip: "${CODE_POST}"

  # ==========================================================================
  # OCCUPATION DU SOL — Végétation (POLYGON)
  # ==========================================================================
  - name: "Zones de végétation"
    source_layer: "ZONE_DE_VEGETATION"
    label_case: "title"
    rules:
      # 1. Bois
      - match:
          NATURE: "Bois"
        set:
          Type: "0x11005"
          EndLevel: "3"
          Label: "Bois"

      # 2. Forêt fermée de conifères
      - match:
          NATURE: "Forêt fermée de conifères"
        set:
          Type: "0x10f1f"
          EndLevel: "3"
          Label: "Forêt de conifères"

      # 3. Forêt fermée de feuillus
      - match:
          NATURE: "Forêt fermée de feuillus"
        set:
          Type: "0x10f1e"
          EndLevel: "3"
          Label: "Forêt de feuillus"

      # 4. Forêt fermée mixte
      - match:
          NATURE: "Forêt fermée mixte"
        set:
          Type: "0x4e"
          EndLevel: "3"

      # 5. Défaut — toute autre végétation (catch-all)
      - match:
          NATURE: "*"
        set:
          Type: "0x11005"
          EndLevel: "2"
