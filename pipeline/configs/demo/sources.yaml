version: 1

# Catalogue de profils de simplification multi-niveaux pour les données IGN BDTOPO.
generalize_profiles_path: "./generalize-profiles.yaml"

# BDTOPO livre parfois chaque feature en double — dedup_by_field: ID dédoublonne
# sur le CLEABS IGN (DBF/SHP tronque "cleabs" → "ID" à la livraison).

grid:
  cell_size: 0.225      # 0.225 = ~25 km par tuile
  overlap: 0.005        # Léger chevauchement pour éviter les artefacts aux bords

inputs:
  # ==========================================================================
  # TRANSPORT (4 couches)
  # ==========================================================================

  # Routes (couche principale — la plus volumineuse)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/TRANSPORT/TRONCON_DE_ROUTE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Voies ferrées
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/TRANSPORT/TRONCON_DE_VOIE_FERREE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Pistes d'aérodrome
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/TRANSPORT/PISTE_D_AERODROME.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Transport par câble (téléphériques, télésièges)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/TRANSPORT/TRANSPORT_PAR_CABLE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # ADMINISTRATIF / LIEUX NOMMÉS (2 couches)
  # ==========================================================================

  # Communes (POI chef-lieu + polygone limites)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Zones d'habitation
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/LIEUX_NOMMES/ZONE_D_HABITATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # HYDROGRAPHIE (3 couches)
  # ==========================================================================

  # NOTE : Utiliser TRONCON_HYDROGRAPHIQUE (pas COURS_D_EAU)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/HYDROGRAPHIE/TRONCON_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # NOTE : Utiliser SURFACE_HYDROGRAPHIQUE (pas PLAN_D_EAU)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/HYDROGRAPHIE/SURFACE_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Détails hydrographiques (POI : sources, cascades, etc.)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/HYDROGRAPHIE/DETAIL_HYDROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # BATI (7 couches)
  # ==========================================================================

  # Bâtiments (polygon — couche volumineuse)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/BATIMENT.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Cimetières
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/CIMETIERE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Constructions linéaires (murs, digues)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/CONSTRUCTION_LINEAIRE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Constructions ponctuelles (châteaux d'eau, monuments)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/CONSTRUCTION_PONCTUELLE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Pylônes (POI)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/PYLONE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Terrains de sport
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/TERRAIN_DE_SPORT.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # Lignes orographiques
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/BATI/LIGNE_OROGRAPHIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # VEGETATION (1 couche)
  # ==========================================================================

  # Zones de végétation (forêts, haies — couche volumineuse)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/OCCUPATION_DU_SOL/ZONE_DE_VEGETATION.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # ZONES RÉGLEMENTÉES (1 couche)
  # ==========================================================================

  # Forêts publiques (ONF)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ZONES_REGLEMENTEES/FORET_PUBLIQUE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # TOPONYMIE (1 couche)
  # ==========================================================================

  # Toponymie (POI — 162 branches sur 10 catégories CLASSE)
  - path: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/LIEUX_NOMMES/TOPONYMIE.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    dedup_by_field: ID

  # ==========================================================================
  # COURBES DE NIVEAU (produit IGN séparé)
  # Polylignes 3D, équidistance 5m filtrée à 10m via attribute_filter
  # ==========================================================================
  - path: "./pipeline/data/contours/D038/COURBE_*.shp"
    source_srs: "EPSG:2154"
    target_srs: "EPSG:4326"
    attribute_filter: "CAST(ALTITUDE AS INTEGER) = (CAST(ALTITUDE AS INTEGER) / 10) * 10"
    layer_alias: "COURBE"
    spatial_filter:
      source: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500  # mètres, dans le SRS source (EPSG:2154)

  # ==========================================================================
  # OSM — POIs et features naturelles (Geofabrik PBF → GPKG)
  # PBF pré-convertis en GPKG par download-data.sh (--with-osm).
  # ==========================================================================

  # --- Amenity POIs (restaurants, pharmacies, parking, etc.) ---
  - path: "./pipeline/data/osm/gpkg/*-amenity-points.gpkg"
    layer_alias: "osm_amenity"
    spatial_filter:
      source: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # --- Natural features ponctuelles (grottes, rochers, dolines) ---
  - path: "./pipeline/data/osm/gpkg/*-natural-points.gpkg"
    layer_alias: "osm_natural_points"
    spatial_filter:
      source: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # --- Tourism viewpoints ---
  - path: "./pipeline/data/osm/gpkg/*-tourism-points.gpkg"
    layer_alias: "osm_tourism"
    spatial_filter:
      source: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

  # ==========================================================================
  # CADASTRE — Piscines privées (SYM=65)
  # Données produites par download-data.sh (--with-pools). Déjà en EPSG:4326.
  # ==========================================================================
  - path: "./pipeline/data/cadastre/D038/gpkg/TSURF_id.gpkg"
    layer_alias: "TSURF_id"
    attribute_filter: "SYM = '65'"

  # ==========================================================================
  # RANDONNÉE — Sentiers de Grande Randonnée (GR)
  # Shapefile EPSG:4326 — clippé à l'emprise communale + buffer.
  # ==========================================================================
  - path: "./pipeline/data/hiking-trails/MON_GR_ITINERAIRE_ME.shp"
    layer_alias: "MON_GR_ITINERAIRE_ME"
    spatial_filter:
      source: "./pipeline/data/IGN-BDTOPO/2026/v2026.03/D038/ADMINISTRATIF/COMMUNE.shp"
      buffer: 500

output:
  directory: "./pipeline/output/ign-bdtopo/2026/v2026.03/D038/mp/"
  filename_pattern: "BDTOPO-{col:03}-{row:03}.mp"
  overwrite: true
  base_id: 38  # Auto-génère des IDs uniques par tuile : ex. 00380001, 00380002, etc.

# Header MP — métadonnées écrites dans chaque tuile .mp
# Le champ 'name' supporte les variables {col}, {row} (0-based), {seq} (1-based)
# avec padding optionnel {col:03}
header:
  name: "BDTOPO-{col:03}-{row:03}"
  copyright: "2026 Allfab Studio - IGN BDTOPO 2026 - Les contributeurs de la communauté OpenStreetMap"
  levels: "7"
  level0: "24"
  level1: "23"
  level2: "22"
  level3: "21"
  level4: "20"
  level5: "18"
  level6: "16"
  simplify_level: "0"
  tree_size: "1000"
  rgn_limit: "1024"
  transparent: "N"
  marine: "N"
  preprocess: "F"
  lbl_coding: "9"
  routing: "Y"
  elevation: "M"

# Règles de transformation BDTOPO → types Garmin
rules: ./garmin-rules.yaml

error_handling: "continue"

# =============================================================================
# OPTIONS AVANCÉES (décommenter si nécessaire)
# =============================================================================
# Filtre bbox (WGS84) — exemple pour l'Isère :
# filters:
#   bbox: [5.0, 44.6, 6.4, 45.9]
