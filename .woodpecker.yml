# Woodpecker CI - mpforge-cli
# Build, test, and create artifacts for mpforge-cli

# Déclenchement
when:
  event:
    - push
    - pull_request
  branch:
    - main

# Variables globales
variables:
  - &rust_image 'rust:1.84-bookworm'
  - &cargo_cache '/root/.cargo'

steps:
  # ============================================================================
  # Étape 1 : Vérifications rapides (lint, format)
  # ============================================================================
  check:
    image: *rust_image
    commands:
      - cd mpforge-cli
      - cargo fmt -- --check
      - cargo clippy --all-targets --all-features -- -D warnings
    when:
      event: [push, pull_request]

  # ============================================================================
  # Étape 2 : Build Linux
  # ============================================================================
  build-linux:
    image: *rust_image
    commands:
      # Installer GDAL
      - apt-get update
      - apt-get install -y libgdal-dev gdal-bin pkg-config

      # Build
      - cd mpforge-cli
      - cargo build --release

      # Vérifier que le binaire existe
      - ls -lh target/release/mpforge-cli

      # Copier dans un dossier d'artifacts
      - mkdir -p /artifacts
      - cp target/release/mpforge-cli /artifacts/mpforge-cli-linux-x64
      - strip /artifacts/mpforge-cli-linux-x64
    when:
      event: [push, pull_request]

  # ============================================================================
  # Étape 3 : Tests unitaires
  # ============================================================================
  test:
    image: *rust_image
    commands:
      # Installer GDAL
      - apt-get update
      - apt-get install -y libgdal-dev gdal-bin

      # Run tests
      - cd mpforge-cli
      - cargo test --release
    when:
      event: [push, pull_request]

  # ============================================================================
  # Étape 4 : Package et upload des artifacts
  # ============================================================================
  package:
    image: alpine:latest
    commands:
      # Créer les archives
      - cd /artifacts
      - tar czf mpforge-cli-linux-x64.tar.gz mpforge-cli-linux-x64
      - ls -lh *.tar.gz

      # Calculer les checksums
      - sha256sum *.tar.gz > checksums.txt
      - cat checksums.txt
    when:
      event: [push, pull_request]
      status: success

  # ============================================================================
  # Étape 5 : Upload vers Forgejo (si tag de release)
  # ============================================================================
  release:
    image: plugins/gitea-release
    settings:
      api_key:
        from_secret: forgejo_token
      base_url: https://forgejo.allfabox.fr
      files:
        - /artifacts/*.tar.gz
        - /artifacts/checksums.txt
      title: "Release ${CI_COMMIT_TAG}"
      note: |
        ## 📦 mpforge-cli ${CI_COMMIT_TAG}

        ### Binaires
        - Linux x64 : `mpforge-cli-linux-x64.tar.gz`

        ### Checksums
        ```
        $(cat /artifacts/checksums.txt)
        ```

        ---
        🤖 Généré automatiquement par Woodpecker CI
    when:
      event: tag
      tag: v*

