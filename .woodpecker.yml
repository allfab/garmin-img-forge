# Woodpecker CI - mpforge-cli
# Build, test, and create artifacts for mpforge-cli

# Déclenchement
when:
  event:
    - push
    - pull_request
  branch:
    - main

# Variables globales
variables:
  - &rust_image 'rust:1.84-bookworm'
  - &cargo_cache '/root/.cargo'

steps:
  # ============================================================================
  # Étape 1 : Vérifications rapides (lint, format)
  # ============================================================================
  check:
    image: *rust_image
    commands:
      - cd mpforge-cli
      - cargo fmt -- --check
      - cargo clippy --all-targets --all-features -- -D warnings
    when:
      event: [push, pull_request]

  # ============================================================================
  # Étape 2 : Build Linux
  # Binaire statique portable (musl + GDAL statique)
  # ============================================================================
  build-linux:
    image: rust:alpine3.21
    commands:
      # Installer dépendances (Alpine utilise musl nativement)
      - apk add --no-cache musl-dev gdal-dev gdal-static pkgconf

      # Ajouter la target musl
      - rustup target add x86_64-unknown-linux-musl

      # Variables pour forcer le linkage statique
      - export GDAL_STATIC=1
      - export GDAL_DYNAMIC=0
      - export PKG_CONFIG_ALL_STATIC=1
      - export RUSTFLAGS="-C target-feature=+crt-static"

      # Build
      - cd mpforge-cli
      - cargo build --release --target x86_64-unknown-linux-musl

      # Vérifier que le binaire est statique
      - ldd target/x86_64-unknown-linux-musl/release/mpforge-cli || echo "✓ Binaire statique confirmé"

      # Copier dans artifacts
      - mkdir -p ../artifacts
      - cp target/x86_64-unknown-linux-musl/release/mpforge-cli ../artifacts/mpforge-cli
      - strip ../artifacts/mpforge-cli

      # Afficher info binaire
      - ls -lh ../artifacts/mpforge-cli
    when:
      event: [push, pull_request]

  # ============================================================================
  # Étape 3 : Tests unitaires
  # ============================================================================
  test:
    image: *rust_image
    commands:
      # Installer GDAL
      - apt-get update
      - apt-get install -y libgdal-dev gdal-bin

      # Run tests
      - cd mpforge-cli
      - cargo test --release
    when:
      event: [push, pull_request]

  # ============================================================================
  # Étape 4 : Package et upload des artifacts
  # ============================================================================
  package:
    image: alpine:latest
    commands:
      # Créer les archives
      - cd artifacts
      - tar czf mpforge-cli-linux-x64.tar.gz mpforge-cli
      - ls -lh *.tar.gz

      # Calculer les checksums
      - sha256sum *.tar.gz > checksums.txt
      - cat checksums.txt

      # Créer les release notes
      - BUILD_DATE=$(date -u +%Y-%m-%d)
      - COMMIT_SHORT=$(echo $CI_COMMIT_SHA | cut -c1-8)
      - |
        cat > release-notes.md << EOF
        ## 📦 mpforge-cli $CI_COMMIT_TAG

        ### 📥 Téléchargement
        - Linux x64 : \`mpforge-cli-linux-x64.tar.gz\`

        ### 📋 Installation
        \`\`\`bash
        tar xzf mpforge-cli-linux-x64.tar.gz
        sudo mv mpforge-cli /usr/local/bin/
        mpforge-cli --version
        \`\`\`

        ### 🔐 Checksums
        Voir le fichier \`checksums.txt\` attaché.

        ---
        🤖 Généré automatiquement par Woodpecker CI
        🔨 Commit : $COMMIT_SHORT
        📅 Date : $BUILD_DATE
        EOF
      - cat release-notes.md
    when:
      event: [push, pull_request]
      status: success

  # ============================================================================
  # Étape 5 : Upload vers Forgejo (si tag de release)
  # ============================================================================
  release:
    image: plugins/gitea-release
    settings:
      api_key:
        from_secret: forgejo_token
      base_url: https://forgejo.allfabox.fr
      files:
        - artifacts/*.tar.gz
        - artifacts/checksums.txt
      title: "Release ${CI_COMMIT_TAG}"
      note: artifacts/release-notes.md
    when:
      event: tag
      tag: v*

