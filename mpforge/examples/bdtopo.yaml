# Production configuration example for mpforge
# Real-world setup for processing BDTOPO data (35 GB)
#
# BDTOPO can be distributed in two formats:
# - 24+ Shapefile files (one per layer)
# - Single GeoPackage file with ~50 layers (recommended)
#
# This example shows both approaches.

version: 1  # Configuration version

grid:
  cell_size: 0.15      # Grid cell size in degrees (~16.5 km) - MUST be > 0.0
  overlap: 0.01        # 1% overlap for edge continuity - MUST be >= 0.0
  origin: [-5.5, 41.0] # Southwest France [lon, lat] - OPTIONAL

inputs:
  # ============================================================================
  # OPTION 1: Single GeoPackage with multiple layers (RECOMMENDED)
  # ============================================================================
  # Benefits:
  # - Single file to manage instead of 24+ shapefiles
  # - Faster loading (SQLite database)
  # - Multi-layer support (Story 5.5)
  #
  # Use this format for BDTOPO Réunion, Martinique, Guadeloupe, etc.
  - path: "bdtopo/BDTOPO_reunion.gpkg"
    layers:
      # Buildings
      - "batiment"
      - "construction_lineaire"
      - "construction_ponctuelle"
      # Transportation
      - "route"
      - "troncon_de_route"
      - "noeud_routier"
      - "voie_ferree"
      - "troncon_de_voie_ferree"
      - "aerodrome"
      - "piste_aerodrome"
      # Water features
      - "cours_d_eau"
      - "plan_d_eau"
      - "troncon_hydrographique"
      - "surface_hydrographique"
      # Administrative boundaries
      - "commune"
      - "arrondissement"
      - "departement"
      - "epci"
      # Land use
      - "zone_vegetation"
      - "terrain_sport"
      - "cimetiere"
      # Points of interest
      - "pai_administratif"
      - "pai_culture_loisirs"
      - "pai_sante"
      - "pai_enseignement"
      - "pai_transport"
      - "pai_gestion_eaux"
      # Energy and utilities
      - "ligne_electrique"
      - "poste_transformation"
      - "reservoir"
      # Add other layers as needed...
      # Note: If a layer doesn't exist in the GeoPackage, it will be skipped
      #       in "continue" mode (default) or cause an error in "fail-fast" mode

  # ============================================================================
  # OPTION 2: Multiple Shapefiles (one per layer)
  # ============================================================================
  # Use this format if you have legacy BDTOPO Shapefile distribution.
  # Each shapefile is a single-layer source (no need for 'layers' field).
  #
  # Uncomment if using Shapefiles instead of GeoPackage:
  #
  # - path: "bdtopo/BATI_INDIFFERENCIE.shp"
  # - path: "bdtopo/ROUTE_PRIMAIRE.shp"
  # - path: "bdtopo/ROUTE_SECONDAIRE.shp"
  # - path: "bdtopo/TERRAIN_SPORT.shp"
  # - path: "bdtopo/ZONE_VEGETATION.shp"
  # - path: "bdtopo/COURS_EAU.shp"
  # - path: "bdtopo/SURFACE_EAU.shp"
  # - path: "bdtopo/PAI_*.shp"  # Wildcard for all PAI layers

output:
  directory: "tiles_bdtopo/"
  filename_pattern: "france_{col}_{row}.mp"  # Variables: {col}, {row}, {seq} (aliases: {x}, {y})
  # overwrite: true  # OPTIONAL: Set to false to skip existing tiles (default: true)
  #                  # Useful for resuming interrupted exports without --skip-existing flag
  # Zero-padding: "france_{col:03}_{row:03}.mp" → france_005_042.mp
  # Sequential: "{seq:04}.mp" → 0001.mp, 0002.mp, ...
  # OPTIONAL: Field mapping configuration (Story 7.4)
  # Uncomment to enable YAML-based field mapping for Polish Map output.
  # Maps source field names (e.g., MP_TYPE, NAME) to canonical Polish Map fields (Type, Label).
  # field_mapping_path: "examples/bdtopo-mapping.yaml"

filters:
  # OPTIONAL: Spatial filters
  # Bounding box for metropolitan France
  bbox: [-5.5, 41.0, 10.0, 51.5]  # [min_lon, min_lat, max_lon, max_lat] - min < max REQUIRED

# ==============================================================================
# HEADER CONFIGURATION (Story 8.1)
# ==============================================================================
# OPTIONAL: Configure Polish Map header options for all exported tiles.
# You can either use a template file OR specify individual fields.
#
# OPTION 1: Use a header template file (recommended for production)
# Uncomment to use a template - all tiles will use this header configuration:
#
# header:
#   template: "examples/header_template.mp"
#
# OPTION 2: Specify individual header fields
# Uncomment and customize fields as needed:
#
# header:
#   # Basic map information
#   name: "BDTOPO Réunion"            # Map name displayed in GPS
#   id: "0"                            # Map ID (0 = auto-assign)
#   copyright: "IGN 2026"              # Copyright notice
#
#   # Detail levels (zoom levels)
#   levels: "4"                        # Number of detail levels (1-10)
#   level0: "24"                       # Zoom level 0 (most detailed)
#   level1: "21"                       # Zoom level 1
#   level2: "18"                       # Zoom level 2
#   level3: "15"                       # Zoom level 3 (least detailed)
#
#   # Performance tuning
#   tree_size: "3000"                  # Tree size (100-15000, default: 3000)
#   rgn_limit: "1024"                  # Region limit (50-1024, default: 1024)
#
#   # Map appearance
#   transparent: "N"                   # Transparent background (Y/N/S)
#   marine: "N"                        # Marine map mode (Y/N)
#
#   # Processing options
#   preprocess: "F"                    # Preprocessing mode (G/F/P/N)
#   lbl_coding: "9"                    # Label encoding (6/9/10)
#   simplify_level: "2"                # Simplification level (0-4)
#   left_side_traffic: "N"             # Left-side traffic (Y/N)
#
#   # Custom fields (arbitrary key-value pairs)
#   custom:
#     DrawPriority: "25"               # Custom draw priority
#     MG: "N"                          # Custom MG flag
#
# NOTE: If both 'template' and individual fields are specified, only the template is used.
#       Individual fields are ignored when a template is present (mutually exclusive, not precedence).

error_handling: "continue"  # OPTIONAL: "continue" or "fail-fast" (default: "continue")
