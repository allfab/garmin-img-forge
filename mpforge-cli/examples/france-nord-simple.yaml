# Configuration mpforge-cli SIMPLIFIÉE pour BDTOPO France Nord v2025.12
# Version avec wildcards - Plus concise mais moins de contrôle sur l'ordre de traitement
#
# IMPORTANT : Les chemins sont relatifs depuis le répertoire 01-SHP/
# Exécutez depuis : /mnt/e/GARMIN/GARMIN-IGN-BDTOPO-MAP/04-DATA-OUTPUT/FRANCE-NORD/v2025.12/01-SHP/

version: 1

grid:
  cell_size: 0.15      # Taille de cellule ~16.5 km
  overlap: 0.01        # Chevauchement de 1%

inputs:
  # ============================================================================
  # Version COMPACTE avec wildcards
  # ============================================================================

  # Tous les fichiers BDTOPO en une seule ligne
  - path: "01-BDTOPO/*.shp"

  # Tous les fichiers OSM
  - path: "02-OSM/*.shp"

  # Toutes les courbes de niveau SRTM
  - path: "03-CONTOUR-LINES/*.shp"

  # Limites océan/mer
  - path: "04-BOUNDS/*.shp"

  # Sentiers GR
  - path: "05-GR/*.shp"

output:
  directory: "tiles_france_nord/"
  filename_pattern: "france_nord_{col}_{row}.mp"

error_handling: "continue"
