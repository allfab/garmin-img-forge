# Regles de transformation BDTOPO D038 -> Polish Map
# Types Garmin : https://wiki.openstreetmap.org/wiki/OSM_Map_On_Garmin/Polish_Map_Types
#
# Ce fichier couvre un sous-ensemble representatif de la BDTOPO pour tester
# le pipeline complet (rules + SRS + report) de l'epic 9.

version: 1

rulesets:
  # ==========================================================================
  # TRANSPORT — Troncons de route (POLYLINE)
  # ==========================================================================
  - name: "Routes"
    source_layer: "TRONCON_DE_ROUTE"
    rules:
      # Autoroutes
      - match:
          NATURE: "Type autoroutier"
        set:
          Type: "0x01"
          Label: "${NUMERO}"
          EndLevel: "4"

      # Bretelles autoroute
      - match:
          NATURE: "Bretelle"
        set:
          Type: "0x09"
          EndLevel: "2"

      # Routes nationales
      - match:
          CL_ADMIN: "Nationale"
          NATURE: "!Rond-point"
        set:
          Type: "0x02"
          Label: "${NUMERO}"
          EndLevel: "3"

      # Routes departementales
      - match:
          CL_ADMIN: "Départementale"
          NATURE: "!Rond-point"
        set:
          Type: "0x03"
          Label: "${NUMERO}"
          EndLevel: "2"

      # Ronds-points (toutes classes)
      - match:
          NATURE: "Rond-point"
        set:
          Type: "0x0c"
          EndLevel: "1"

      # Routes a 2 chaussees (hors autoroute/nationale/departementale)
      - match:
          NATURE: "Route à 2 chaussées"
        set:
          Type: "0x04"
          Label: "${TOPONYME}"
          EndLevel: "2"

      # Routes a 1 chaussee
      - match:
          NATURE: "Route à 1 chaussée"
        set:
          Type: "0x05"
          Label: "${TOPONYME}"
          EndLevel: "1"

      # Routes empierrees
      - match:
          NATURE: "Route empierrée"
        set:
          Type: "0x0a"
          Label: "${TOPONYME}"
          EndLevel: "1"

      # Chemins
      - match:
          NATURE: "Chemin"
        set:
          Type: "0x16"
          Label: "${TOPONYME}"
          EndLevel: "0"

      # Sentiers
      - match:
          NATURE: "Sentier"
        set:
          Type: "0x16"
          Label: "${TOPONYME}"
          EndLevel: "0"

      # Escaliers (ignores — pas de match = pas d'export)
      # Bac ou liaison maritime (ignores)

  # ==========================================================================
  # TRANSPORT — Voies ferrees (POLYLINE)
  # ==========================================================================
  - name: "Voies ferrees"
    source_layer: "TRONCON_DE_VOIE_FERREE"
    rules:
      # LGV
      - match:
          NATURE: "LGV"
        set:
          Type: "0x14"
          Label: "${TOPONYME}"
          EndLevel: "3"

      # Voie ferree principale
      - match:
          NATURE: "Voie ferrée principale"
        set:
          Type: "0x14"
          Label: "${TOPONYME}"
          EndLevel: "2"

      # Tramway
      - match:
          NATURE: "Tramway"
        set:
          Type: "0x14"
          EndLevel: "0"

      # Funiculaire
      - match:
          NATURE: "Funiculaire ou crémaillère"
        set:
          Type: "0x14"
          EndLevel: "0"

  # ==========================================================================
  # HYDROGRAPHIE — Cours d'eau (POLYLINE)
  # ==========================================================================
  - name: "Cours d'eau"
    source_layer: "COURS_D_EAU"
    rules:
      # Cours d'eau importants (importance 1-3)
      - match:
          IMPORTANCE: "1"
        set:
          Type: "0x1f"
          Label: "${TOPONYME}"
          EndLevel: "4"

      - match:
          IMPORTANCE: "2"
        set:
          Type: "0x1f"
          Label: "${TOPONYME}"
          EndLevel: "3"

      - match:
          IMPORTANCE: "3"
        set:
          Type: "0x1f"
          Label: "${TOPONYME}"
          EndLevel: "2"

      - match:
          IMPORTANCE: "4"
        set:
          Type: "0x1f"
          Label: "${TOPONYME}"
          EndLevel: "1"

      # Tous les autres cours d'eau
      - match:
          IMPORTANCE: "*"
        set:
          Type: "0x1f"
          Label: "${TOPONYME}"
          EndLevel: "0"

  # ==========================================================================
  # HYDROGRAPHIE — Plans d'eau (POLYGON)
  # ==========================================================================
  - name: "Plans d'eau"
    source_layer: "PLAN_D_EAU"
    rules:
      # Lacs
      - match:
          NATURE: "Lac"
        set:
          Type: "0x3c"
          Label: "${TOPONYME}"
          EndLevel: "3"

      # Retenues / barrages
      - match:
          NATURE: "Retenue"
        set:
          Type: "0x3c"
          Label: "${TOPONYME}"
          EndLevel: "2"

      - match:
          NATURE: "Retenue-barrage"
        set:
          Type: "0x3c"
          Label: "${TOPONYME}"
          EndLevel: "2"

      # Glaciers
      - match:
          NATURE: "Glacier, névé"
        set:
          Type: "0x4d"
          Label: "${TOPONYME}"
          EndLevel: "3"

      # Tous les autres plans d'eau
      - match:
          NATURE: "*"
        set:
          Type: "0x3c"
          Label: "${TOPONYME}"
          EndLevel: "1"

  # ==========================================================================
  # OCCUPATION DU SOL — Vegetation (POLYGON)
  # ==========================================================================
  - name: "Vegetation"
    source_layer: "ZONE_DE_VEGETATION"
    rules:
      # Forets
      - match:
          NATURE: "Forêt fermée de feuillus"
        set:
          Type: "0x50"
          EndLevel: "2"

      - match:
          NATURE: "Forêt fermée de conifères"
        set:
          Type: "0x50"
          EndLevel: "2"

      - match:
          NATURE: "Forêt fermée mixte"
        set:
          Type: "0x50"
          EndLevel: "2"

      - match:
          NATURE: "Forêt ouverte"
        set:
          Type: "0x50"
          EndLevel: "1"

      # Bois
      - match:
          NATURE: "Bois"
        set:
          Type: "0x50"
          EndLevel: "1"

      # Vignes
      - match:
          NATURE: "Vigne"
        set:
          Type: "0x4e"
          EndLevel: "1"

      # Vergers
      - match:
          NATURE: "Verger"
        set:
          Type: "0x4e"
          EndLevel: "1"

      # Lande ligneuse
      - match:
          NATURE: "Lande ligneuse"
        set:
          Type: "0x52"
          EndLevel: "1"

      # Peupleraies
      - match:
          NATURE: "Peupleraie"
        set:
          Type: "0x50"
          EndLevel: "1"

      # Haies (ignorees - trop denses, peu utiles sur GPS)
