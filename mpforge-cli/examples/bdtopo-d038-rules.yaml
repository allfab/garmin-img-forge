# Regles de transformation BDTOPO D038 -> Polish Map
# Types Garmin : https://wiki.openstreetmap.org/wiki/OSM_Map_On_Garmin/Polish_Map_Types
# Source de verite : FME 07-VOIRIE.fmw (PIPELINE-GARMIN-IGN-BDTOPO.md sections 5.3-5.5)
#
# Ce fichier couvre la BDTOPO D038 (Isere) avec les rulesets transport alignes FME
# et un sous-ensemble hydrographie/vegetation pour test du pipeline complet.

version: 1

rulesets:
  # ==========================================================================
  # TRANSPORT — Troncons de route (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager TRONCON_DE_ROUTE
  # Ordre critique : CL_ADMIN prioritaire, puis fallback NATURE
  # ==========================================================================
  - name: "Routes"
    source_layer: "TRONCON_DE_ROUTE"
    rules:
      # --- Priorite CL_ADMIN ---
      - match:
          CL_ADMIN: "Autoroute"
        set:
          Type: "0x01"
          EndLevel: "7"
          Label: "~[0x04]${NUMERO}"

      - match:
          CL_ADMIN: "Nationale"
          NATURE: "!Rond-point"
        set:
          Type: "0x04"
          EndLevel: "7"
          Label: "~[0x05]${NUMERO}"

      - match:
          CL_ADMIN: "Nationale"
          NATURE: "Rond-point"
        set:
          Type: "0x04"
          EndLevel: "7"

      - match:
          CL_ADMIN: "Départementale"
          NATURE: "!Rond-point"
        set:
          Type: "0x05"
          EndLevel: "7"
          Label: "~[0x06]${NUMERO}"

      - match:
          CL_ADMIN: "Départementale"
          NATURE: "Rond-point"
        set:
          Type: "0x04"
          EndLevel: "7"

      - match:
          CL_ADMIN: "Route intercommunale"
        set:
          Type: "0x05"
          EndLevel: "7"
          Label: "${NUMERO}"

      # --- Fallback NATURE ---
      - match:
          NATURE: "Route à 1 chaussée"
        set:
          Type: "0x06"
          EndLevel: "2"

      - match:
          NATURE: "Route à 2 chaussées"
        set:
          Type: "0x06"
          EndLevel: "2"

      - match:
          NATURE: "Rond-point"
        set:
          Type: "0x06"
          EndLevel: "2"

      - match:
          NATURE: "Route empierrée"
        set:
          Type: "0x07"
          EndLevel: "1"

      - match:
          NATURE: "Bretelle"
        set:
          Type: "0x09"
          EndLevel: "7"

      - match:
          NATURE: "Type autoroutier"
        set:
          Type: "0x09"
          EndLevel: "7"
          Label: "~[0x04]${NUMERO}"

      - match:
          NATURE: "Chemin"
        set:
          Type: "0x0a"
          EndLevel: "1"

      - match:
          NATURE: "Escalier"
        set:
          Type: "0x0f"
          EndLevel: "1"

      - match:
          NATURE: "Piste cyclable"
        set:
          Type: "0x0e"
          EndLevel: "1"

      - match:
          NATURE: "Sentier"
        set:
          Type: "0x10"
          EndLevel: "1"

      - match:
          NATURE: "Bac ou liaison maritime"
        set:
          Type: "0x1b"
          EndLevel: "1"

  # ==========================================================================
  # TRANSPORT — Voies ferrees (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager TRONCON_DE_VOIE_FERREE
  # POS_SOL="-1" en PREMIER (souterrain override toute NATURE)
  # ==========================================================================
  - name: "Voies ferrees"
    source_layer: "TRONCON_DE_VOIE_FERREE"
    rules:
      - match:
          POS_SOL: "-1"
        set:
          Type: "0x10e06"
          EndLevel: "5"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Voie ferrée principale"
          POS_SOL: "!-1"
        set:
          Type: "0x10c00"
          EndLevel: "5"
          Label: "${TOPONYME}"

      - match:
          NATURE: "LGV"
          POS_SOL: "!-1"
        set:
          Type: "0x10e02"
          EndLevel: "5"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Voie de service"
          POS_SOL: "!-1"
        set:
          Type: "0x10e03"
          EndLevel: "5"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Tramway"
          POS_SOL: "!-1"
        set:
          Type: "0x10e04"
          EndLevel: "5"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Funiculaire ou crémaillère"
          POS_SOL: "!-1"
        set:
          Type: "0x10e05"
          EndLevel: "5"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Sans objet"
          POS_SOL: "!-1"
        set:
          Type: "0x10c00"
          EndLevel: "5"
          Label: "${TOPONYME}"

  # ==========================================================================
  # ADMINISTRATIF — Communes (POLYGON)
  # Source FME : 01-COMMUNE-ZONEURBA.fmw
  # ==========================================================================
  - name: "Communes"
    source_layer: "COMMUNE"
    rules:
      - match:
          NOM: "*"
        set:
          Type: "0x54"
          EndLevel: "7"
          Label: "${NOM}"
          Country: "France~[0x1d]FRA"
          CityName: "${NOM}"
          Zip: "${CODE_POST}"

  # ==========================================================================
  # ADMINISTRATIF — Zones d'habitation (POLYGON)
  # Source FME : 01-COMMUNE-ZONEURBA.fmw
  # ==========================================================================
  - name: "Zones d'habitation"
    source_layer: "ZONE_D_HABITATION"
    rules:
      - match:
          NATURE: "Lieu-dit habité"
        set:
          Type: "0x03"
          EndLevel: "4"
          Label: "${TOPONYME}"

  # ==========================================================================
  # HYDROGRAPHIE — Troncons hydrographiques (POLYLINE)
  # Source FME : 04-COMMUNE-HYDROGRAPHIE.fmw (PERSISTANC seulement, pas NATURE)
  # ==========================================================================
  - name: "Troncons hydrographiques"
    source_layer: "TRONCON_HYDROGRAPHIQUE"
    rules:
      - match:
          PERSISTANC: "Intermittent"
        set:
          Type: "0x26"
          EndLevel: "2"
          Label: "${NOM_C_EAU}"

      - match:
          PERSISTANC: "*"
        set:
          Type: "0x18"
          EndLevel: "2"
          Label: "${NOM_C_EAU}"

  # ==========================================================================
  # HYDROGRAPHIE — Surfaces hydrographiques (POLYGON)
  # Source FME : 04-COMMUNE-HYDROGRAPHIE.fmw (NATURE Glacier en premier, puis PERSISTANC)
  # ==========================================================================
  - name: "Surfaces hydrographiques"
    source_layer: "SURFACE_HYDROGRAPHIQUE"
    rules:
      - match:
          NATURE: "Glacier, névé"
        set:
          Type: "0x4d"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

      - match:
          PERSISTANC: "Intermittent"
        set:
          Type: "0x4c"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

      - match:
          PERSISTANC: "Inconnue"
        set:
          Type: "0x4c"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

      - match:
          PERSISTANC: "*"
        set:
          Type: "0x3f"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

  # ==========================================================================
  # HYDROGRAPHIE — Details hydrographiques (POI)
  # Source FME : 04-COMMUNE-HYDROGRAPHIE.fmw
  # ==========================================================================
  - name: "Details hydrographiques"
    source_layer: "DETAIL_HYDROGRAPHIQUE"
    rules:
      - match:
          NATURE: "Arroyo"
        set:
          Type: "0x06501"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Baie"
        set:
          Type: "0x06503"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Cascade"
        set:
          Type: "0x06508"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Crique"
        set:
          Type: "0x06507"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Fontaine"
        set:
          Type: "0x06509"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Glacier"
        set:
          Type: "0x0650a"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Lac"
        set:
          Type: "0x0650d"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Marais"
        set:
          Type: "0x06513"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Mer"
        set:
          Type: "0x06510"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Réservoir"
        set:
          Type: "0x0650f"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Source"
        set:
          Type: "0x06511"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Source captée"
        set:
          Type: "0x06511"
          EndLevel: "2"
          Label: "${TOPONYME}"

      - match:
          NATURE: "*"
        set:
          Type: "0x06414"
          EndLevel: "2"
          Label: "${TOPONYME}"

  # ==========================================================================
  # TRANSPORT — Pistes d'aerodrome (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager PISTE_D_AERODROME
  # 2 regles — pas de catch-all (NATURE non reconnue = feature ignoree)
  # ==========================================================================
  - name: "Pistes aerodrome"
    source_layer: "PISTE_D_AERODROME"
    rules:
      - match:
          NATURE: "Piste en dur"
        set:
          Type: "0x1090b"
          EndLevel: "4"
          Label: "${TOPONYME}"

      - match:
          NATURE: "Piste en herbe"
        set:
          Type: "0x10f17"
          EndLevel: "4"
          Label: "${TOPONYME}"

  # ==========================================================================
  # TRANSPORT — Transport par cable (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager TRANSPORT_PAR_CABLE
  # 1 regle statique (wildcard)
  # ==========================================================================
  - name: "Transport par cable"
    source_layer: "TRANSPORT_PAR_CABLE"
    rules:
      - match:
          NATURE: "*"
        set:
          Type: "0x10f0b"
          EndLevel: "2"
          Label: "${TOPONYME}"

  # ==========================================================================
  # OCCUPATION DU SOL — Vegetation (POLYGON)
  # ==========================================================================
  - name: "Vegetation"
    source_layer: "ZONE_DE_VEGETATION"
    rules:
      # Forets
      - match:
          NATURE: "Forêt fermée de feuillus"
        set:
          Type: "0x50"
          EndLevel: "2"

      - match:
          NATURE: "Forêt fermée de conifères"
        set:
          Type: "0x50"
          EndLevel: "2"

      - match:
          NATURE: "Forêt fermée mixte"
        set:
          Type: "0x50"
          EndLevel: "2"

      - match:
          NATURE: "Forêt ouverte"
        set:
          Type: "0x50"
          EndLevel: "1"

      # Bois
      - match:
          NATURE: "Bois"
        set:
          Type: "0x50"
          EndLevel: "1"

      # Vignes
      - match:
          NATURE: "Vigne"
        set:
          Type: "0x4e"
          EndLevel: "1"

      # Vergers
      - match:
          NATURE: "Verger"
        set:
          Type: "0x4e"
          EndLevel: "1"

      # Lande ligneuse
      - match:
          NATURE: "Lande ligneuse"
        set:
          Type: "0x52"
          EndLevel: "1"

      # Peupleraies
      - match:
          NATURE: "Peupleraie"
        set:
          Type: "0x50"
          EndLevel: "1"

      # Haies (ignorees - trop denses, peu utiles sur GPS)
