# Configuration mpforge-cli pour BDTOPO France Nord v2025.12
# Chemins relatifs depuis le répertoire 01-SHP/
#
# Dataset : GARMIN-IGN-BDTOPO-MAP France Nord
# Source   : BDTOPO IGN + OSM + SRTM Contours
# Couches  : 46 shapefiles (Administratif, Hydrographie, Bâti, Transport, OSM, Contours)

version: 1

grid:
  cell_size: 0.15      # Taille de cellule ~16.5 km (adapté pour France Nord)
  overlap: 0.01        # Chevauchement de 1% pour éviter les artefacts de bord
  # origin: [-5.5, 42.0]  # Optionnel : Point d'origine sud-ouest France Nord

inputs:
  # ============================================================================
  # 01-BDTOPO - Données administratives et réglementaires
  # ============================================================================

  # Administratif (Communes, Zones d'habitation, Chefs-lieux)
  - path: "01-BDTOPO/01-IGNBDTOPO-FRANCE-NORD-ADMINISTRATIF-COMMUNE.shp"
  - path: "01-BDTOPO/02-IGNBDTOPO-FRANCE-NORD-ADMINISTRATIF-ZONEHABITATION.shp"
  - path: "01-BDTOPO/03-IGNBDTOPO-FRANCE-NORD-ADMINISTRATIF-CHEFLIEU.shp"

  # Zones réglementées
  - path: "01-BDTOPO/04-IGNBDTOPO-FRANCE-NORD-ZONEREGLEMENTEE-FORETPUBLIQUE.shp"

  # Services et activités
  - path: "01-BDTOPO/05-IGNBDTOPO-FRANCE-NORD-SERVICEACTIVITE-ZAE.shp"
  - path: "01-BDTOPO/06-IGNBDTOPO-FRANCE-NORD-SERVICEACTIVITE-LIGNEELECTRIQUE.shp"

  # ============================================================================
  # Hydrographie (Cours d'eau, Surfaces, Détails)
  # ============================================================================

  - path: "01-BDTOPO/07-IGNBDTOPO-FRANCE-NORD-HYDROGRAPHIE-TRONCON.shp"
  - path: "01-BDTOPO/08-IGNBDTOPO-FRANCE-NORD-HYDROGRAPHIE-SURFACE.shp"
  - path: "01-BDTOPO/09-IGNBDTOPO-FRANCE-NORD-HYDROGRAPHIE-DETAILS.shp"

  # ============================================================================
  # Occupation du sol - Végétation
  # ============================================================================
  # Note : Fichiers partitionnés (_1, _2, _3) + fichier principal

  - path: "01-BDTOPO/10-IGNBDTOPO-FRANCE-NORD-OCCSOL-VEGETATION.shp"
  - path: "01-BDTOPO/10-IGNBDTOPO-FRANCE-NORD-OCCSOL-VEGETATION_1.shp"
  - path: "01-BDTOPO/10-IGNBDTOPO-FRANCE-NORD-OCCSOL-VEGETATION_2.shp"
  - path: "01-BDTOPO/10-IGNBDTOPO-FRANCE-NORD-OCCSOL-VEGETATION_3.shp"

  # ============================================================================
  # Bâti - Emprises
  # ============================================================================
  # Note : Fichiers partitionnés (_1, _2, _3) + fichier principal

  - path: "01-BDTOPO/11-IGNBDTOPO-FRANCE-NORD-BATI-EMPRISE.shp"
  - path: "01-BDTOPO/11-IGNBDTOPO-FRANCE-NORD-BATI-EMPRISE_1.shp"
  - path: "01-BDTOPO/11-IGNBDTOPO-FRANCE-NORD-BATI-EMPRISE_2.shp"
  - path: "01-BDTOPO/11-IGNBDTOPO-FRANCE-NORD-BATI-EMPRISE_3.shp"

  # Bâti - Structures spécifiques
  - path: "01-BDTOPO/12-IGNBDTOPO-FRANCE-NORD-BATI-CIMETIERE.shp"
  - path: "01-BDTOPO/13-IGNBDTOPO-FRANCE-NORD-BATI-CONSTRUCTIONLINEAIRE.shp"
  - path: "01-BDTOPO/14-IGNBDTOPO-FRANCE-NORD-BATI-CONSTRUCTIONPONCTUELLE.shp"
  - path: "01-BDTOPO/15-IGNBDTOPO-FRANCE-NORD-BATI-TERRAINSPORT.shp"
  - path: "01-BDTOPO/16-IGNBDTOPO-FRANCE-NORD-BATI-LIGNEOROGRAPHIQUE.shp"
  - path: "01-BDTOPO/17-IGNBDTOPO-FRANCE-NORD-BATI-PYLONE.shp"

  # ============================================================================
  # Transport
  # ============================================================================

  # Routes (Tronçons routiers - partition + principal)
  - path: "01-BDTOPO/18-IGNBDTOPO-FRANCE-NORD-TRANSPORT-TRONCONROUTE.shp"
  - path: "01-BDTOPO/18-IGNBDTOPO-FRANCE-NORD-TRANSPORT-TRONCONROUTE_1.shp"

  # Autres infrastructures de transport
  - path: "01-BDTOPO/19-IGNBDTOPO-FRANCE-NORD-TRANSPORT-VOIEFERREE.shp"
  - path: "01-BDTOPO/20-IGNBDTOPO-FRANCE-NORD-TRANSPORT-PISTEAERODROME.shp"
  - path: "01-BDTOPO/21-IGNBDTOPO-FRANCE-NORD-TRANSPORT-CABLE.shp"

  # ============================================================================
  # Toponymie (Noms de lieux)
  # ============================================================================
  # Note : Préfixe "FRANCE-SUD" dans les noms mais utilisés pour France Nord

  - path: "01-BDTOPO/22-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-AERODROME.shp"
  - path: "01-BDTOPO/23-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-CIMETIERE.shp"
  - path: "01-BDTOPO/24-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-CONSTRUCTION-LINEAIRE.shp"
  - path: "01-BDTOPO/25-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-CONSTRUCTION-PONCTUELLE.shp"
  - path: "01-BDTOPO/26-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-CONSTRUCTION-SURFACIQUE.shp"
  - path: "01-BDTOPO/27-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-DETAIL-OROGRAPHIQUE.shp"
  - path: "01-BDTOPO/28-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-FORET-PUBLIQUE.shp"
  - path: "01-BDTOPO/29-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-LIEUDIT-NON-HABITE.shp"
  - path: "01-BDTOPO/30-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-ZONE-ACTIVITE-INTERET.shp"
  - path: "01-BDTOPO/31-IGNBDTOPO-FRANCE-SUD-TOPONYMIE-ZONE-HABITATION.shp"

  # ============================================================================
  # 02-OSM - Données OpenStreetMap complémentaires
  # ============================================================================

  # Points d'intérêt naturels
  - path: "02-OSM/OSM-FRANCE-NORD-NATURAL-POI.shp"
  - path: "02-OSM/OSM-FRANCE-NORD-NATURAL-RIDGE-CLIFF-ARETE.shp"

  # Points d'intérêt urbains
  - path: "02-OSM/OSM-FRANCE-NORD-POI-AMENITY.shp"
  - path: "02-OSM/OSM-FRANCE-NORD-POI-SHOPS.shp"

  # Tourisme
  - path: "02-OSM/OSM-FRANCE-NORD-TOURISM-VIEWPOINT.shp"

  # ============================================================================
  # 03-CONTOUR-LINES - Courbes de niveau SRTM 30m (10m d'équidistance)
  # ============================================================================
  # Note : Fichiers par département

  - path: "03-CONTOUR-LINES/11-STRM30m-CONTOUR-LINES-10m.shp"  # Aude
  - path: "03-CONTOUR-LINES/24-STRM30m-CONTOUR-LINES-10m.shp"  # Dordogne
  - path: "03-CONTOUR-LINES/27-STRM30m-CONTOUR-LINES-10m.shp"  # Eure
  - path: "03-CONTOUR-LINES/28-STRM30m-CONTOUR-LINES-10m.shp"  # Eure-et-Loir
  - path: "03-CONTOUR-LINES/32-STRM30m-CONTOUR-LINES-10m.shp"  # Gers
  - path: "03-CONTOUR-LINES/44-STRM30m-CONTOUR-LINES-10m.shp"  # Loire-Atlantique
  - path: "03-CONTOUR-LINES/52-STRM30m-CONTOUR-LINES-10m.shp"  # Haute-Marne
  - path: "03-CONTOUR-LINES/53-STRM30m-CONTOUR-LINES-10m.shp"  # Mayenne

  # ============================================================================
  # 04-BOUNDS - Limites océan/mer
  # ============================================================================

  - path: "04-BOUNDS/100-IGN-BDTOPO-FRANCE-NORD-OCEAN-MER-4326.shp"

  # ============================================================================
  # 05-GR - Sentiers de Grande Randonnée
  # ============================================================================

  - path: "05-GR/99-FRANCE-NORD-GR.shp"

output:
  directory: "tiles_france_nord/"
  filename_pattern: "france_nord_{x}_{y}.mp"

# Filtre spatial optionnel pour France Nord métropolitaine
# Décommenter et ajuster selon vos besoins
# filters:
#   bbox: [-5.5, 42.0, 10.0, 51.5]  # [min_lon, min_lat, max_lon, max_lat]

error_handling: "continue"  # Continue même si certains fichiers sont problématiques
