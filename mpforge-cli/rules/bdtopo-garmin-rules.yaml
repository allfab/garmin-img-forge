# Regles de transformation BDTOPO -> Polish Map (production)
# Source de verite : garmin-ign-bdtopo-map-v1/01-PROJECTS/03-FME/v2025.12/
#   07-IGN-BDTOPO-ESRI-SHP-TO-ESRI-SHP-GARMIN-VOIRIE.fmw
# Ref doc : PIPELINE-GARMIN-IGN-BDTOPO.md sections 5.3-5.5
#
# Types Garmin : https://wiki.openstreetmap.org/wiki/OSM_Map_On_Garmin/Polish_Map_Types
# Shield codes Polish Map : ~[0x04]=autoroute, ~[0x05]=nationale, ~[0x06]=departementale
#
# IMPORTANT: L'ordre des regles est critique (first-match-wins).

version: 1

rulesets:
  # ==========================================================================
  # TRANSPORT — Troncons de route (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager TRONCON_DE_ROUTE
  # 17 regles couvrant toutes les combinaisons CL_ADMIN x NATURE
  # ==========================================================================
  - name: "Routes"
    source_layer: "TRONCON_DE_ROUTE"
    rules:
      # --- Priorite CL_ADMIN (evaluee en premier dans FME) ---

      # 1. Autoroute (toute NATURE)
      - match:
          CL_ADMIN: "Autoroute"
        set:
          Type: "0x01"
          EndLevel: "7"
          Label: "~[0x04]${NUMERO}"

      # 2. Nationale (hors Rond-point)
      - match:
          CL_ADMIN: "Nationale"
          NATURE: "!Rond-point"
        set:
          Type: "0x04"
          EndLevel: "7"
          Label: "~[0x05]${NUMERO}"

      # 3. Nationale Rond-point (pas de label)
      - match:
          CL_ADMIN: "Nationale"
          NATURE: "Rond-point"
        set:
          Type: "0x04"
          EndLevel: "7"

      # 4. Departementale (hors Rond-point)
      - match:
          CL_ADMIN: "Départementale"
          NATURE: "!Rond-point"
        set:
          Type: "0x05"
          EndLevel: "7"
          Label: "~[0x06]${NUMERO}"

      # 5. Departementale Rond-point (Type override 0x04, pas de label)
      - match:
          CL_ADMIN: "Départementale"
          NATURE: "Rond-point"
        set:
          Type: "0x04"
          EndLevel: "7"

      # 6. Route intercommunale (toute NATURE)
      - match:
          CL_ADMIN: "Route intercommunale"
        set:
          Type: "0x05"
          EndLevel: "7"
          Label: "${NUMERO}"

      # --- Fallback NATURE (quand CL_ADMIN ne matche pas les prioritaires) ---

      # 7. Route a 1 chaussee
      - match:
          NATURE: "Route à 1 chaussée"
        set:
          Type: "0x06"
          EndLevel: "2"

      # 8. Route a 2 chaussees
      - match:
          NATURE: "Route à 2 chaussées"
        set:
          Type: "0x06"
          EndLevel: "2"

      # 9. Rond-point (generique, apres les CL_ADMIN specifiques)
      - match:
          NATURE: "Rond-point"
        set:
          Type: "0x06"
          EndLevel: "2"

      # 10. Route empierree
      - match:
          NATURE: "Route empierrée"
        set:
          Type: "0x07"
          EndLevel: "1"

      # 11. Bretelle
      - match:
          NATURE: "Bretelle"
        set:
          Type: "0x09"
          EndLevel: "7"

      # 12. Type autoroutier
      - match:
          NATURE: "Type autoroutier"
        set:
          Type: "0x09"
          EndLevel: "7"
          Label: "~[0x04]${NUMERO}"

      # 13. Chemin
      - match:
          NATURE: "Chemin"
        set:
          Type: "0x0a"
          EndLevel: "1"

      # 14. Escalier
      - match:
          NATURE: "Escalier"
        set:
          Type: "0x0f"
          EndLevel: "1"

      # 15. Piste cyclable
      - match:
          NATURE: "Piste cyclable"
        set:
          Type: "0x0e"
          EndLevel: "1"

      # 16. Sentier
      - match:
          NATURE: "Sentier"
        set:
          Type: "0x10"
          EndLevel: "1"

      # 17. Bac ou liaison maritime
      - match:
          NATURE: "Bac ou liaison maritime"
        set:
          Type: "0x1b"
          EndLevel: "1"

  # ==========================================================================
  # TRANSPORT — Voies ferrees (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager TRONCON_DE_VOIE_FERREE
  # 7 regles — POS_SOL="-1" en PREMIER (souterrain override toute NATURE)
  # ==========================================================================
  - name: "Voies ferrees"
    source_layer: "TRONCON_DE_VOIE_FERREE"
    rules:
      # 1. Souterrain (POS_SOL=-1, quelle que soit NATURE) — DOIT ETRE EN PREMIER
      - match:
          POS_SOL: "-1"
        set:
          Type: "0x10e06"
          EndLevel: "5"
          Label: "${TOPONYME}"

      # 2. Voie ferree principale (hors souterrain)
      - match:
          NATURE: "Voie ferrée principale"
          POS_SOL: "!-1"
        set:
          Type: "0x10c00"
          EndLevel: "5"
          Label: "${TOPONYME}"

      # 3. LGV (hors souterrain)
      - match:
          NATURE: "LGV"
          POS_SOL: "!-1"
        set:
          Type: "0x10e02"
          EndLevel: "5"
          Label: "${TOPONYME}"

      # 4. Voie de service (hors souterrain)
      - match:
          NATURE: "Voie de service"
          POS_SOL: "!-1"
        set:
          Type: "0x10e03"
          EndLevel: "5"
          Label: "${TOPONYME}"

      # 5. Tramway (hors souterrain)
      - match:
          NATURE: "Tramway"
          POS_SOL: "!-1"
        set:
          Type: "0x10e04"
          EndLevel: "5"
          Label: "${TOPONYME}"

      # 6. Funiculaire ou cremaillere (hors souterrain)
      - match:
          NATURE: "Funiculaire ou crémaillère"
          POS_SOL: "!-1"
        set:
          Type: "0x10e05"
          EndLevel: "5"
          Label: "${TOPONYME}"

      # 7. Sans objet (hors souterrain)
      - match:
          NATURE: "Sans objet"
          POS_SOL: "!-1"
        set:
          Type: "0x10c00"
          EndLevel: "5"
          Label: "${TOPONYME}"

  # ==========================================================================
  # TRANSPORT — Pistes d'aerodrome (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager PISTE_D_AERODROME
  # 2 regles — pas de catch-all (NATURE non reconnue = feature ignoree)
  # ==========================================================================
  - name: "Pistes aerodrome"
    source_layer: "PISTE_D_AERODROME"
    rules:
      # 1. Piste en dur
      - match:
          NATURE: "Piste en dur"
        set:
          Type: "0x1090b"
          EndLevel: "4"
          Label: "${TOPONYME}"

      # 2. Piste en herbe
      - match:
          NATURE: "Piste en herbe"
        set:
          Type: "0x10f17"
          EndLevel: "4"
          Label: "${TOPONYME}"

  # ==========================================================================
  # TRANSPORT — Transport par cable (POLYLINE)
  # Source FME : 07-VOIRIE.fmw / AttributeManager TRANSPORT_PAR_CABLE
  # 1 regle statique (wildcard)
  # ==========================================================================
  - name: "Transport par cable"
    source_layer: "TRANSPORT_PAR_CABLE"
    rules:
      # 1. Toute feature (mapping statique)
      - match:
          NATURE: "*"
        set:
          Type: "0x10f0b"
          EndLevel: "2"
          Label: "${TOPONYME}"

  # ==========================================================================
  # ADMINISTRATIF — Communes (POLYGON)
  # Source FME : 01-COMMUNE-ZONEURBA.fmw
  # 1 regle wildcard avec attributs speciaux Country, CityName, Zip
  # ==========================================================================
  - name: "Communes"
    source_layer: "COMMUNE"
    rules:
      # 1. Toute commune (mapping statique)
      - match:
          NOM: "*"
        set:
          Type: "0x54"
          EndLevel: "7"
          Label: "${NOM}"
          Country: "France~[0x1d]FRA"
          CityName: "${NOM}"
          Zip: "${CODE_POST}"

  # ==========================================================================
  # ADMINISTRATIF — Zones d'habitation (POLYGON)
  # Source FME : 01-COMMUNE-ZONEURBA.fmw
  # 1 regle NATURE="Lieu-dit habite" (seule NATURE traitee par FME)
  # ==========================================================================
  - name: "Zones d'habitation"
    source_layer: "ZONE_D_HABITATION"
    rules:
      # 1. Lieu-dit habite
      - match:
          NATURE: "Lieu-dit habité"
        set:
          Type: "0x03"
          EndLevel: "4"
          Label: "${TOPONYME}"

  # ==========================================================================
  # HYDROGRAPHIE — Troncons hydrographiques (POLYLINE)
  # Source FME : 04-COMMUNE-HYDROGRAPHIE.fmw
  # 2 regles — Intermittent en premier, puis catch-all (Permanent, Inconnue, vide)
  # ==========================================================================
  - name: "Troncons hydrographiques"
    source_layer: "TRONCON_HYDROGRAPHIQUE"
    rules:
      # 1. Intermittent (seul type different du defaut)
      - match:
          PERSISTANC: "Intermittent"
        set:
          Type: "0x26"
          EndLevel: "2"
          Label: "${NOM_C_EAU}"

      # 2. Catch-all (Permanent, Inconnue, vide)
      - match:
          PERSISTANC: "*"
        set:
          Type: "0x18"
          EndLevel: "2"
          Label: "${NOM_C_EAU}"

  # ==========================================================================
  # HYDROGRAPHIE — Surfaces hydrographiques (POLYGON)
  # Source FME : 04-COMMUNE-HYDROGRAPHIE.fmw
  # 4 regles — NATURE="Glacier, neve" en PREMIER (override PERSISTANC)
  # ==========================================================================
  - name: "Surfaces hydrographiques"
    source_layer: "SURFACE_HYDROGRAPHIQUE"
    rules:
      # 1. Glacier, neve (override toute valeur de PERSISTANC)
      - match:
          NATURE: "Glacier, névé"
        set:
          Type: "0x4d"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

      # 2. Intermittent (hors Glacier)
      - match:
          PERSISTANC: "Intermittent"
        set:
          Type: "0x4c"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

      # 3. Inconnue
      - match:
          PERSISTANC: "Inconnue"
        set:
          Type: "0x4c"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

      # 4. Catch-all (Permanent, vide)
      - match:
          PERSISTANC: "*"
        set:
          Type: "0x3f"
          EndLevel: "2"
          Label: "${NOM_P_EAU}"

  # ==========================================================================
  # HYDROGRAPHIE — Details hydrographiques (POI)
  # Source FME : 04-COMMUNE-HYDROGRAPHIE.fmw
  # 13 regles — 12 NATURE explicites + catch-all (Citerne, Lavoir, Perte, Point d'eau, Resurgence)
  # ==========================================================================
  - name: "Details hydrographiques"
    source_layer: "DETAIL_HYDROGRAPHIQUE"
    rules:
      # 1. Arroyo
      - match:
          NATURE: "Arroyo"
        set:
          Type: "0x06501"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 2. Baie
      - match:
          NATURE: "Baie"
        set:
          Type: "0x06503"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 3. Cascade
      - match:
          NATURE: "Cascade"
        set:
          Type: "0x06508"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 4. Crique
      - match:
          NATURE: "Crique"
        set:
          Type: "0x06507"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 5. Fontaine
      - match:
          NATURE: "Fontaine"
        set:
          Type: "0x06509"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 6. Glacier
      - match:
          NATURE: "Glacier"
        set:
          Type: "0x0650a"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 7. Lac
      - match:
          NATURE: "Lac"
        set:
          Type: "0x0650d"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 8. Marais
      - match:
          NATURE: "Marais"
        set:
          Type: "0x06513"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 9. Mer
      - match:
          NATURE: "Mer"
        set:
          Type: "0x06510"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 10. Reservoir
      - match:
          NATURE: "Réservoir"
        set:
          Type: "0x0650f"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 11. Source
      - match:
          NATURE: "Source"
        set:
          Type: "0x06511"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 12. Source captee
      - match:
          NATURE: "Source captée"
        set:
          Type: "0x06511"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 13. Catch-all (Citerne, Lavoir, Perte, Point d'eau, Resurgence, etc.)
      - match:
          NATURE: "*"
        set:
          Type: "0x06414"
          EndLevel: "2"
          Label: "${TOPONYME}"
