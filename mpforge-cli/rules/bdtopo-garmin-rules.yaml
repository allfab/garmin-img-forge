      # 8. Quai
      - match:
          NATURE: "Quai"
        set:
          Type: "0x10e16"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 9. Ruines
      - match:
          NATURE: "Ruines"
        set:
          Type: "0x10e15"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 10. Sport de montagne
      - match:
          NATURE: "Sport de montagne"
        set:
          Type: "0x10f0c"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 11. Tunnel
      - match:
          NATURE: "Tunnel"
        set:
          Type: "0x10e08"
          EndLevel: "2"
          Label: "${TOPONYME}"

      # 12. Catch-all (NATURE non reconnue)
      - match:
          NATURE: "*"
        set:
          Type: "0x10c04"
          EndLevel: "2"
          Label: "${TOPONYME}"

  # ==========================================================================
  # BATI — Constructions ponctuelles (POI)
  # Source FME : 06-BATI.fmw / AttributeManager CONSTRUCTION_PONCTUELLE
  # 12 regles NATURE, pas de catch-all (NATURE non reconnue = feature ignoree)
  # Label : ${TOPONYME} (FME : fallback NAT_DETAIL/NATURE non reproductible)
  # ==========================================================================
  - name: "Constructions ponctuelles"
    source_layer: "CONSTRUCTION_PONCTUELLE"
    rules:
