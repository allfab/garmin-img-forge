  # ==========================================================================
  # BATI — Pylones (POI)
  # Source FME : 06-BATI.fmw / AttributeCreator PYLONE (statique)
  # 1 regle wildcard — Type 0x11503 (ECART avec doc : doc dit 0x11500)
  # Label : Pas de Label (pas de champ NAME dans FME)
  # ==========================================================================
  - name: "Pylones"
    source_layer: "PYLONE"
    rules:
      # 1. Toute feature (mapping statique)
      - match:
          NATURE: "*"
        set:
          Type: "0x11503"
          EndLevel: "2"

  # ==========================================================================
  # BATI — Terrains de sport (POLYGON)
  # Source FME : 06-BATI.fmw / AttributeManager TERRAIN_DE_SPORT
  # 5 regles NATURE + catch-all 0x1090d, EndLevel variable (2 ou 4)
  # Label : ${NAT_DETAIL} (FME renomme NAT_DETAIL→NAME)
  # ==========================================================================
  - name: "Terrains de sport"
    source_layer: "TERRAIN_DE_SPORT"
    rules:
      # 1. Bassin de natation
      - match:
          NATURE: "Bassin de natation"
        set:
          Type: "0x10f1d"
          EndLevel: "2"
          Label: "${NAT_DETAIL}"

      # 2. Grand terrain de sport (EndLevel=4, pas 2 !)
      - match:
          NATURE: "Grand terrain de sport"
        set:
          Type: "0x1090d"
          EndLevel: "4"
          Label: "${NAT_DETAIL}"

      # 3. Petit terrain multi-sports
      - match:
          NATURE: "Petit terrain multi-sports"
        set:
          Type: "0x1100a"
          EndLevel: "2"
          Label: "${NAT_DETAIL}"

      # 4. Piste de sport
      - match:
          NATURE: "Piste de sport"
        set:
          Type: "0x10f1b"
          EndLevel: "2"
          Label: "${NAT_DETAIL}"

      # 5. Terrain de tennis
      - match:
          NATURE: "Terrain de tennis"
        set:
          Type: "0x10f1c"
          EndLevel: "2"
          Label: "${NAT_DETAIL}"

      # 6. Catch-all (NATURE non reconnue → Grand terrain par defaut, EndLevel=2)
      - match:
          NATURE: "*"
        set:
          Type: "0x1090d"
          EndLevel: "2"
          Label: "${NAT_DETAIL}"

  # ==========================================================================
  # OROGRAPHIE — Lignes orographiques (POLYLINE)
  # Source FME : 06-BATI.fmw / AttributeManager LIGNE_OROGRAPHIQUE
  # 3 regles NATURE, pas de catch-all (NATURE non reconnue = feature ignoree)
  # Label : ${NATURE} (FME renomme NATURE→NAME)
  # ==========================================================================
  - name: "Lignes orographiques"
    source_layer: "LIGNE_OROGRAPHIQUE"
    rules:
      # 1. Carriere
      - match:
          NATURE: "Carrière"
        set:
          Type: "0x10e1a"
          EndLevel: "2"
          Label: "${NATURE}"

      # 2. Levee
      - match:
          NATURE: "Levée"
        set:
          Type: "0x10e17"
          EndLevel: "2"
          Label: "${NATURE}"

      # 3. Talus
      - match:
          NATURE: "Talus"
        set:
          Type: "0x10e19"
          EndLevel: "2"
          Label: "${NATURE}"

  # ==========================================================================
  # VEGETATION — Zones de vegetation (POLYGON)
  # Source FME : 05-VEGETATION.fmw / AttributeManager ZONE_DE_VEGETATION
  # 10 regles NATURE + catch-all 0x11005, EndLevel variable (4 ou 6)
  # Labels : raccourcis FME (pas le NATURE brut), certains sans Label
  # ==========================================================================
  - name: "Zones de vegetation"
    source_layer: "ZONE_DE_VEGETATION"
    rules:
      # 1. Bois (EndLevel=6, Label statique)
      - match:
          NATURE: "Bois"
        set:
          Type: "0x11005"
          EndLevel: "6"
          Label: "Bois"

      # 2. Foret fermee de coniferes (EndLevel=6, Label raccourci)
      - match:
          NATURE: "Forêt fermée de conifères"
        set:
          Type: "0x10f1f"
          EndLevel: "6"
          Label: "Forêt de conifères"

      # 3. Foret fermee de feuillus (EndLevel=6, Label raccourci)
      - match:
          NATURE: "Forêt fermée de feuillus"
        set:
          Type: "0x10f1e"
          EndLevel: "6"
          Label: "Forêt de feuillus"

      # 4. Foret fermee mixte (EndLevel=6, pas de Label)
      - match:
          NATURE: "Forêt fermée mixte"
        set:
          Type: "0x4e"
          EndLevel: "6"

      # 5. Foret ouverte (EndLevel=6, pas de Label)
      - match:
          NATURE: "Forêt ouverte"
        set:
          Type: "0x11000"
          EndLevel: "6"

      # 6. Haie (EndLevel=4, pas de Label)
      - match:
          NATURE: "Haie"
        set:
          Type: "0x11002"
          EndLevel: "4"

      # 7. Lande ligneuse (EndLevel=4, pas de Label)
      - match:
          NATURE: "Lande ligneuse"
        set:
          Type: "0x11003"
          EndLevel: "4"

      # 8. Peupleraie (EndLevel=4, Label statique)
      - match:
          NATURE: "Peupleraie"
        set:
          Type: "0x11001"
          EndLevel: "4"
          Label: "Peupleraie"

      # 9. Verger (EndLevel=4, Label statique)
      - match:
          NATURE: "Verger"
        set:
          Type: "0x11004"
          EndLevel: "4"
          Label: "Verger"

      # 10. Vigne (EndLevel=4, Label statique)
      - match:
          NATURE: "Vigne"
        set:
          Type: "0x11004"
          EndLevel: "4"
          Label: "Vigne"

      # 11. Catch-all (NATURE non reconnue → Bois par defaut, EndLevel=4)
      - match:
          NATURE: "*"
        set:
          Type: "0x11005"
          EndLevel: "4"
