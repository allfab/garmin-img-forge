        set:
          Type: "0x10f0a"
          EndLevel: "2"

      # 4. Eglise
      - match:
          NATURE: "Eglise"
        set:
          Type: "0x10f0b"
          EndLevel: "2"

      # 5. Fort, blockhaus, casemate
      - match:
          NATURE: "Fort, blockhaus, casemate"
        set:
          Type: "0x10f0c"
          EndLevel: "2"

      # 6. Indifferenciee
      - match:
          NATURE: "Indifférenciée"
        set:
          Type: "0x1101c"
          EndLevel: "2"

      # 7. Industriel, agricole ou commercial
      - match:
          NATURE: "Industriel, agricole ou commercial"
        set:
          Type: "0x10f04"
          EndLevel: "2"

      # 8. Monument
      - match:
          NATURE: "Monument"
        set:
          Type: "0x10f0d"
          EndLevel: "2"

      # 9. Serre
      - match:
          NATURE: "Serre"
        set:
          Type: "0x10f05"
          EndLevel: "2"

      # 10. Silo
      - match:
          NATURE: "Silo"
        set:
          Type: "0x10f06"
          EndLevel: "2"

      # 11. Tour, donjon
      - match:
          NATURE: "Tour, donjon"
        set:
          Type: "0x10f11"
          EndLevel: "2"

      # 12. Tribune
      - match:
          NATURE: "Tribune"
        set:
          Type: "0x10f12"
          EndLevel: "2"

      # 13. Catch-all (NATURE inconnue, Prefecture, Sous-prefecture, Construction legere)
      - match:
          NATURE: "*"
        set:
          Type: "0x1101c"
          EndLevel: "2"

  # ==========================================================================
  # BATI — Cimetieres (POLYGON)
  # Source FME : 06-BATI.fmw / AttributeManager CIMETIERE
  # 3 regles NATURE, pas de catch-all (NATURE non reconnue = feature ignoree)
  # Label : Pas de Label (FME : AttributeKeeper ne garde que NATURE)
  # ==========================================================================
  - name: "Cimetieres"
    source_layer: "CIMETIERE"
    rules:
      # 1. Civil
      - match:
          NATURE: "Civil"
        set:
          Type: "0x1a"
          EndLevel: "4"

      # 2. Militaire
      - match:
          NATURE: "Militaire"
        set:
          Type: "0x10f13"
          EndLevel: "4"

      # 3. Militaire etranger
      - match:
          NATURE: "Militaire étranger"
        set:
          Type: "0x10f13"
          EndLevel: "4"

  # ==========================================================================
  # BATI — Constructions lineaires (POLYLINE)
  # Source FME : 06-BATI.fmw / AttributeManager CONSTRUCTION_LINEAIRE
  # 11 regles NATURE + catch-all 0x10c04
  # Label : ${TOPONYME} (FME renomme TOPONYME→NAME)
  # ==========================================================================
  - name: "Constructions lineaires"
    source_layer: "CONSTRUCTION_LINEAIRE"
    rules:
      # 1. Autre ligne descriptive
      - match:
          NATURE: "Autre ligne descriptive"
        set:
          Type: "0x10c04"
          EndLevel: "2"
